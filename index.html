/*

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(event){

            const img =
            new Image();

            img.src =
            event.target.result;

            img.onload = function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 450;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext(
                    '2d'
                );

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(
                    function(blob){

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.55
                );
            };
        };
    });
}

/*
گرفتن GPS
*/

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        let finished = false;

        const timer = setTimeout(()=>{

            if(finished){
                return;
            }

            finished = true;

            resolve({
                lat:null,
                lng:null
            });

        },50000);

        navigator.geolocation.getCurrentPosition(

            position => {

                if(finished){
                    return;
                }

                finished = true;

                clearTimeout(timer);

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude

                });
            },

           error => {

    alert(
        'GPS Error: ' +
        error.code +
        '\n' +
        error.message
    );

    if(finished){
        return;
    }

    finished = true;

    clearTimeout(timer);

    resolve({
        lat:null,
        lng:null
    });
},

            {
    enableHighAccuracy:true,
    timeout:50000,
    maximumAge:60000
}
        );
    });
}

/*

async function syncOfflineAttendance(){

    if(!navigator.onLine){
        return;
    }

    let offlineAttendance =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(offlineAttendance.length === 0){
        return;
    }

    for(const item of offlineAttendance){

    try{

        if(item.photo){

            const response =
            await fetch(item.photo);

            const blob =
            await response.blob();

            await supabaseClient.storage
            .from('reference-photos')
            .upload(
                'attendance/' +
                item.photo_name,
                blob,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );
        }

        const {
            photo,
            ...attendanceData
        } = item;

        const result =
        await supabaseClient
        .from('eagle')
        .insert([attendanceData]);

        if(result.error){
            throw result.error;
        }

    }catch(err){

        console.log(err);
    }
}

    if(offlineAttendance.length > 0){

    localStorage.removeItem(
        'offline_attendance'
    );
}
}

/*
نمایش سوابق
*/

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){
        return;
    }

    try{

        let allRecords = [];

        /*
        دریافت ترددهای آنلاین از Supabase
        */

        if(navigator.onLine){

            const { data } =
            await supabaseClient
            .from('eagle')
            .select('*')
            .eq(
                'personnel_code',
                personnel_code
            )
            .order(
                'id',
                {
                    ascending:false
                }
            );

            if(data){
                allRecords =
                allRecords.concat(
                    data
                );
            }
        }

        /*
        اضافه کردن ترددهای آفلاین ذخیره‌شده در موبایل
        */

        const offlineAttendance =
        JSON.parse(
            localStorage.getItem(
                'offline_attendance'
            ) || '[]'
        );

        const myOfflineRecords =
        offlineAttendance.filter(
            item =>
            item.personnel_code === personnel_code
        );

        allRecords =
        allRecords.concat(
            myOfflineRecords
        );

        if(allRecords.length === 0){

            document.getElementById(
                'myRecords'
            ).innerHTML =
            '<div class="record">هنوز ترددی ثبت نشده است.</div>';

            return;
        }

        /*
        گروه‌بندی بر اساس روز
        */

        const groupedDays = {};

        allRecords.forEach(item => {

            if(!item.entry_time){
                return;
            }

            const day =
            item.entry_time.split('،')[0];

            if(!groupedDays[day]){
                groupedDays[day] = [];
            }

            groupedDays[day].push(item);
        });

        /*
        مرتب‌سازی روزها بر اساس آخرین تردد همان روز
        */

        const sortedDays =
        Object.keys(groupedDays)
        .sort((a,b) => {

            const lastA =
            groupedDays[a][0];

            const lastB =
            groupedDays[b][0];

            const idA =
            lastA.id || 0;

            const idB =
            lastB.id || 0;

            return idB - idA;
        })
        .slice(0,3);

        let html = '';

        sortedDays.forEach(day => {

            const records =
            groupedDays[day];

            /*
            چون اطلاعات آنلاین با id نزولی آمده،
            ولی اطلاعات آفلاین id ندارد،
            اینجا با همان ترتیب موجود کار می‌کنیم.
            */

            records.sort((a,b) => {

                const idA =
                a.id || 0;

                const idB =
                b.id || 0;

                return idA - idB;
            });

            const firstRecord =
            records[0];

            const lastRecord =
            records[
                records.length - 1
            ];

            html += `
            <div class="record">

                <p>
                    📅 تاریخ:
                    ${day}
                </p>

                <hr>

                <p>
                    🟢 اولین ورود:
                    ${firstRecord.entry_time}
                </p>
            `;

            if(records.length > 1){

                html += `
                <p>
                    🔴 آخرین خروج:
                    ${lastRecord.entry_time}
                </p>
                `;

            }else{

                html += `
                <p>
                    🔴 آخرین خروج:
                    هنوز ثبت نشده
                </p>
                `;
            }

            html += `
            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}
