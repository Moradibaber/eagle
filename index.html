   function openOfflineDB(){

    return new Promise((resolve, reject) => {

        const request =
        indexedDB.open(
            'attendance_offline_db',
            1
        );

        request.onupgradeneeded =
        function(event){

            const db =
            event.target.result;

            if(
                !db.objectStoreNames.contains(
                    'attendance_photos'
                )
            ){
                db.createObjectStore(
                    'attendance_photos',
                    {
                        keyPath:'fileName'
                    }
                );
            }
        };

        request.onsuccess =
        function(event){
            resolve(
                event.target.result
            );
        };

        request.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function saveAttendancePhotoOffline(fileName, blob){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readwrite'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        store.put({
            fileName:fileName,
            blob:blob
        });

        tx.oncomplete =
        function(){
            resolve();
        };

        tx.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function getAttendancePhotoOffline(fileName){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readonly'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        const request =
        store.get(
            fileName
        );

        request.onsuccess =
        function(){

            if(request.result){
                resolve(
                    request.result.blob
                );
            }else{
                resolve(null);
            } 
        };

        request.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function deleteAttendancePhotoOffline(fileName){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readwrite'

        };

        function(event){
            reject(

        };
    });
}

/*
فشرده سازی عکس
*/
async function compressImage(file){

    return new Promise((resolve, reject)=>{

        const reader =
        new FileReader();

        reader.onload = function(event){

            const img =
            new Image();

            img.onload = function(){

                const canvas =
                document.createElement('canvas');

                const finalSize = 320;

                canvas.width = finalSize;
                canvas.height = finalSize;

                const ctx =
                canvas.getContext('2d');

                /*
                برش مربعی از مرکز تصویر
                برای اینکه اگر کاربر صورت را وسط کادر بگیرد،
                خروجی بیشتر روی صورت متمرکز باشد.
                */

                const sourceSize =
                Math.min(
                    img.width,
                    img.height
                );

                const sourceX =
                Math.floor(
                    (img.width - sourceSize) / 2
                );

                const sourceY =
                Math.floor(
                    (img.height - sourceSize) / 2
                );

                ctx.drawImage(
                    img,
                    sourceX,
                    sourceY,
                    sourceSize,
                    sourceSize,
                    0,
                    0,
                    finalSize,
                    finalSize
                );

                canvas.toBlob(
                    function(blob){

                        if(!blob){
                            reject(
                                new Error('خطا در فشرده‌سازی عکس')
                            );
                            return;
                        }

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.45
                );
            };

            img.onerror = function(){
                reject(
                    new Error('خطا در خواندن تصویر')
                );
            };

            img.src =
            event.target.result;
        };

        reader.onerror = function(){
            reject(
                new Error('خطا در خواندن فایل عکس')
            );
        };

        reader.readAsDataURL(file);
    });
}

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        navigator.geolocation.getCurrentPosition(

            position => {

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude
                });
            },

            error => {

                resolve({
                    lat:null,
                    lng:null
                });
            },

            {
                enableHighAccuracy:true,
                timeout:10000,
                maximumAge:0
            }
        );
    });
}
    /*
ثبت تردد
*/
async function saveAttendance(){

    const fullnameInput =
    document.getElementById(
        'fullname'
    );

    const codeInput =
    document.getElementById(
        'personnel_code'
    );

    const fullname =
    fullnameInput.value.trim();

    const personnelCode =
    codeInput.value.trim();

    if(!fullname || !personnelCode){

        alert(
            'لطفاً نام و کد پرسنلی را وارد کنید.'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    showUserInfo();

    lockPersonnelFields();

    const attendanceInput =
    document.getElementById(
        'attendancePhoto'
    );

    attendanceInput.value = '';

    showLoading(
        'در حال دریافت موقعیت مکانی، لطفاً صبر کنید...'
    );

    const location =
    await getLocation();

    if(
        location.lat === null ||
        location.lng === null
    ){

        alert(
            'موقعیت مکانی دریافت نشد. لطفاً GPS گوشی را روشن کنید.'
        );

        hideLoading();

        return;
    }

    attendanceInput.onchange = async function(e){

        try{

            const file =
            e.target.files[0];

            if(!file){

                alert(
                    'هیچ عکسی انتخاب نشد.'
                );

                hideLoading();

                return;
            }

            showLoading(
                'در حال فشرده‌سازی عکس و ثبت تردد، لطفاً صبر کنید...'
            );

            const compressedFile =
            await compressImage(
                file
            );

            const fileName =
            'attendance_' +
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            const attendanceItem = {

                personnel_code:
                personnelCode,

                fullname:
                fullname,

                entry_time:
                new Date()
                .toLocaleString(
                    'fa-IR'
                ),

                latitude:
                location.lat,

                longitude:
                location.lng,

                photo_name:
                fileName
            };

            /*
            اگر آفلاین بود یا Supabase آماده نبود
            */

            if(!navigator.onLine || !supabaseClient){

                await saveAttendancePhotoOffline(
                    fileName,
                    compressedFile
                );

                let offlineAttendance =
                JSON.parse(
                    localStorage.getItem(
                        'offline_attendance'
                    ) || '[]'
                );

                offlineAttendance.push(
                    attendanceItem
                );

                localStorage.setItem(
                    'offline_attendance',
                    JSON.stringify(
                        offlineAttendance
                    )
                );

                updateOfflineCounter();

                alert(
                    'تردد آفلاین همراه عکس ذخیره شد'
                );

                hideLoading();

                loadMyRecords();

                return;
            }

            /*
            اگر آنلاین بود
            */

            const uploadResult =
            await supabaseClient.storage
            .from('reference-photos')
            .upload(
                'attendance/' +
                fileName,
                compressedFile,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                alert(
                    'خطا در آپلود عکس:\n' +
                    uploadResult.error.message
                );

                hideLoading();

                return;
            }

            const insertResult =
            await supabaseClient
            .from('eagle')
            .insert([
                attendanceItem
            ]);

            if(insertResult.error){

                alert(
                    'خطا در ثبت اطلاعات:\n' +
                    insertResult.error.message
                );

                hideLoading();

                return;
            }

            alert(
                'تردد ثبت شد'
            );

            hideLoading();

            loadMyRecords();

        }catch(err){

            console.log(err);

            alert(
                'خطا:\n' + err.message
            );

            hideLoading();
        }
    };

    /*
    بعد از گرفتن GPS، دوربین باز می‌شود
    */

    hideLoading();

    attendanceInput.click();
}

async function syncOfflineAttendance(){

    if(!navigator.onLine || !supabaseClient){
        return;
    }


    let offlineAttendance =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineAttendance.length === 0
    ){
        return;
    }

    let notSynced = [];

    for(
        const item of offlineAttendance
    ){

        try{

            const photoBlob =
            await getAttendancePhotoOffline(
                item.photo_name
            );

            if(!photoBlob){

                console.log(
                    'عکس آفلاین پیدا نشد:',
                    item.photo_name
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const uploadResult =
            await supabaseClient.storage
            .from(
                'reference-photos'
            )
            .upload(
                'attendance/' +
                item.photo_name,
                photoBlob,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                console.log(
                    uploadResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const insertResult =
            await supabaseClient
            .from(
                'eagle'
            )
            .insert([
                {
                    personnel_code:
                    item.personnel_code,

                    fullname:
                    item.fullname,

                    entry_time:
                    item.entry_time,

                    latitude:
                    item.latitude,

                    longitude:
                    item.longitude,

                    photo_name:
                    item.photo_name
                }
            ]);

            if(insertResult.error){

                console.log(
                    insertResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            await deleteAttendancePhotoOffline(
                item.photo_name
            );

        }catch(err){

            console.log(
                err
            );

            notSynced.push(
                item
            );
        }
    }

    if(
        notSynced.length > 0
    ){

        localStorage.setItem(
            'offline_attendance',
            JSON.stringify(
                notSynced
            )
        );

    }else{

        localStorage.removeItem(
            'offline_attendance'
        );
    }
    updateOfflineCounter();
}

/*
نمایش سوابق
*/

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){
        return;
    }

    try{

        let allRecords = [];

        /*
        دریافت ترددهای آنلاین از Supabase
        */

       if(navigator.onLine && supabaseClient){

    const { data } =
    await supabaseClient

            .from('eagle')
            .select('*')
            .eq(
                'personnel_code',
                personnel_code
            )
            .order(
                'id',
                {
                    ascending:false
                }
            );

            if(data){
                allRecords =
                allRecords.concat(
                    data
                );
            }
        }

        /*
        اضافه کردن ترددهای آفلاین ذخیره‌شده در موبایل
        */

        const offlineAttendance =
        JSON.parse(
            localStorage.getItem(
                'offline_attendance'
            ) || '[]'
        );

        const myOfflineRecords =
        offlineAttendance.filter(
            item =>
            item.personnel_code === personnel_code
        );

        allRecords =
        allRecords.concat(
            myOfflineRecords
        );

        if(allRecords.length === 0){

            document.getElementById(
                'myRecords'
            ).innerHTML =
            '<div class="record">هنوز ترددی ثبت نشده است.</div>';

            return;
        }

        /*
        گروه‌بندی بر اساس روز
        */

        const groupedDays = {};

        allRecords.forEach(item => {

            if(!item.entry_time){
                return;
            }

            const day =
            item.entry_time.split('،')[0];

            if(!groupedDays[day]){
                groupedDays[day] = [];
            }

            groupedDays[day].push(item);
        });

        /*
        مرتب‌سازی روزها بر اساس آخرین تردد همان روز
        */

        const sortedDays =
        Object.keys(groupedDays)
        .sort((a,b) => {

            const lastA =
            groupedDays[a][0];

            const lastB =
            groupedDays[b][0];

            const idA =
            lastA.id || 0;

            const idB =
            lastB.id || 0;

            return idB - idA;
        })
        .slice(0,3);

        let html = '';

        sortedDays.forEach(day => {

            const records =
            groupedDays[day];

            /*
            چون اطلاعات آنلاین با id نزولی آمده،
            ولی اطلاعات آفلاین id ندارد،
            اینجا با همان ترتیب موجود کار می‌کنیم.
            */

            records.sort((a,b) => {

                const idA =
                a.id || 0;

                const idB =
                b.id || 0;

                return idA - idB;
            });

            const firstRecord =
            records[0];

            const lastRecord =
            records[
                records.length - 1
            ];

            html += `
            <div class="record">

                <p>
                    📅 تاریخ:
                    ${day}
                </p>

                <hr>

                <p>
                    🟢 اولین ورود:
                    ${firstRecord.entry_time}
                </p>
            `;

            if(records.length > 1){

                html += `
                <p>
                    🔴 آخرین خروج:
                    ${lastRecord.entry_time}
                </p>
                `;

            }else{

                html += `
                <p>
                    🔴 آخرین خروج:
                    هنوز ثبت نشده
                </p>
                `;
            }

            html += `
            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}


</script>

</body>
</html>
