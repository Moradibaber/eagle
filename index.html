   function openOfflineDB(){

    return new Promise((resolve, reject) => {

        const request =
        indexedDB.open(
            'attendance_offline_db',
            1
        );

        request.onupgradeneeded =
        function(event){

            const db =
            event.target.result;

            if(
                !db.objectStoreNames.contains(
                    'attendance_photos'
                )
            ){
                db.createObjectStore(
                    'attendance_photos',
                    {
                        keyPath:'fileName'
                    }
                );
            }
        };

        request.onsuccess =
        function(event){
            resolve(
                event.target.result
            );
        };

        request.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function saveAttendancePhotoOffline(fileName, blob){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readwrite'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        store.put({
            fileName:fileName,
            blob:blob
        });

        tx.oncomplete =
        function(){
            resolve();
        };

        tx.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function getAttendancePhotoOffline(fileName){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readonly'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        const request =
        store.get(
            fileName
        );

        request.onsuccess =
        function(){

            if(request.result){
                resolve(
                    request.result.blob
                );
            }else{
                resolve(null);
            } 
        };

        request.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

/*
فشرده سازی عکس
*/
async function compressImage(file){

    return new Promise((resolve, reject)=>{

        const reader =
        new FileReader();

        reader.onload = function(event){

            const img =
            new Image();

            img.onload = function(){

                const canvas =
                document.createElement('canvas');

                const finalSize = 320;

                canvas.width = finalSize;
                canvas.height = finalSize;

                const ctx =
                canvas.getContext('2d');

                /*
                برش مربعی از مرکز تصویر
                برای اینکه اگر کاربر صورت را وسط کادر بگیرد،
                خروجی بیشتر روی صورت متمرکز باشد.
                */

                const sourceSize =
                Math.min(
                    img.width,
                    img.height
                );

                const sourceX =
                Math.floor(
                    (img.width - sourceSize) / 2
                );

                const sourceY =
                Math.floor(
                    (img.height - sourceSize) / 2
                );

                ctx.drawImage(
                    img,
                    sourceX,
                    sourceY,
                    sourceSize,
                    sourceSize,
                    0,
                    0,
                    finalSize,
                    finalSize
                );

                canvas.toBlob(
                    function(blob){

                        if(!blob){
                            reject(
                                new Error('خطا در فشرده‌سازی عکس')
                            );
                            return;
                        }

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.45
                );
            };

            img.onerror = function(){
                reject(
                    new Error('خطا در خواندن تصویر')
                );
            };

            img.src =
            event.target.result;
        };

        reader.onerror = function(){
            reject(
                new Error('خطا در خواندن فایل عکس')
            );
        };

        reader.readAsDataURL(file);
    });
}

function getLocation(){

    return new Promise(function(resolve){

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null,
                accuracy:null
            });

            return;
        }

        navigator.geolocation.getCurrentPosition(

            function(position){

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude,

                    accuracy:
                    position.coords.accuracy
                });
            },

            function(error){

                console.log(
                    'Geolocation error:',
                    error
                );

                resolve({
                    lat:null,
                    lng:null,
                    accuracy:null
                });
            },

            {
                enableHighAccuracy:false,
                timeout:20000,
                maximumAge:300000
            }
        );
    });
}

    /*
ثبت تردد
*/
async function saveAttendance(){

    const fullnameInput =
    document.getElementById(
        'fullname'
    );

    const codeInput =
    document.getElementById(
        'personnel_code'
    );

    const fullname =
    fullnameInput.value.trim();

    const personnelCode =
    codeInput.value.trim();

    if(!fullname || !personnelCode){

        alert(
            'لطفاً نام و کد پرسنلی را وارد کنید.'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    showUserInfo();

    lockPersonnelFields();

    showLoading(
        'در حال دریافت موقعیت مکانی...'
    );

    const location =
    await getLocation();

    if(
        location.lat === null ||
        location.lng === null
    ){

        hideLoading();

        alert(
            'موقعیت مکانی دریافت نشد.\n\n' +
            'برای ثبت تردد، لطفاً Location / GPS گوشی را روشن کنید و اجازه دسترسی به موقعیت مکانی را بدهید.'
        );

        return;
    }

    const maxAllowedAccuracy =
    5000;

    if(
        location.accuracy !== null &&
        location.accuracy > maxAllowedAccuracy
    ){

        hideLoading();

        alert(
            'دقت موقعیت مکانی کافی نیست.\n\n' +
            'دقت فعلی حدود ' +
            Math.round(location.accuracy) +
            ' متر است.\n' +
            'حداکثر دقت قابل قبول ۵۰۰۰ متر است.\n\n' +
            'لطفاً Location گوشی را روشن‌تر بررسی کنید یا در فضای بازتر دوباره تلاش کنید.'
        );

        return;
    }

    const attendanceInput =
    document.getElementById(
        'attendancePhoto'
    );

    attendanceInput.value = '';

    attendanceInput.onchange = async function(e){

        try{

            const file =
            e.target.files[0];

            if(!file){

                hideLoading();

                alert(
                    'هیچ عکسی انتخاب نشد.'
                );

                return;
            }

            showLoading(
                'در حال فشرده‌سازی عکس و ثبت تردد...'
            );

            const compressedFile =
            await compressImage(
                file
            );

            const fileName =
            'attendance_' +
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            const attendanceItem = {

                personnel_code:
                personnelCode,

                fullname:
                fullname,

                entry_time:
                new Date()
                .toLocaleString(
                    'fa-IR'
                ),

                latitude:
                location.lat,

                longitude:
                location.lng,

                location_accuracy:
                location.accuracy,

                photo_name:
                fileName
            };

            async function saveOffline(){

                await saveAttendancePhotoOffline(
                    fileName,
                    compressedFile
                );

                let offlineAttendance =
                JSON.parse(
                    localStorage.getItem(
                        'offline_attendance'
                    ) || '[]'
                );

                offlineAttendance.push(
                    attendanceItem
                );

                localStorage.setItem(
                    'offline_attendance',
                    JSON.stringify(
                        offlineAttendance
                    )
                );

                updateOfflineCounter();

                await loadMyRecords();

                hideLoading();

                alert(
                    'تردد به صورت آفلاین همراه با مختصات ذخیره شد.'
                );
            }

            if(!navigator.onLine || !supabaseClient){

                await saveOffline();

                return;
            }

            try{

                const uploadResult =
                await supabaseClient.storage
                .from(
                    'reference-photos'
                )
                .upload(
                    'attendance/' +
                    fileName,
                    compressedFile,
                    {
                        upsert:true,
                        contentType:'image/jpeg'
                    }
                );

                if(uploadResult.error){

                    throw new Error(
                        uploadResult.error.message
                    );
                }

                const insertResult =
                await supabaseClient
                .from(
                    'eagle'
                )
                .insert([
                    attendanceItem
                ]);

                if(insertResult.error){

                    throw new Error(
                        insertResult.error.message
                    );
                }

                hideLoading();

                alert(
                    'تردد همراه با مختصات ثبت شد.'
                );

                await loadMyRecords();

            }catch(onlineError){

                console.log(
                    'ثبت آنلاین ناموفق بود، ذخیره آفلاین انجام می‌شود:',
                    onlineError
                );

                await saveOffline();

                return;
            }

        }catch(err){

            console.log(
                err
            );

            hideLoading();

            alert(
                'خطا:\n' + err.message
            );
        }
    };

    hideLoading();

    attendanceInput.click();
}


async function syncOfflineAttendance(){

    if(!navigator.onLine || !supabaseClient){
        return;
    }


    let offlineAttendance =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineAttendance.length === 0
    ){
        return;
    }

    let notSynced = [];

    for(
        const item of offlineAttendance
    ){

        try{

            const photoBlob =
            await getAttendancePhotoOffline(
                item.photo_name
            );

            if(!photoBlob){

                console.log(
                    'عکس آفلاین پیدا نشد:',
                    item.photo_name
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const uploadResult =
            await supabaseClient.storage
            .from(
                'reference-photos'
            )
            .upload(
                'attendance/' +
                item.photo_name,
                photoBlob,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                console.log(
                    uploadResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const insertResult =
            await supabaseClient
            .from(
                'eagle'
            )
            .insert([
                {
                    personnel_code:
                    item.personnel_code,

                    fullname:
                    item.fullname,

                    entry_time:
                    item.entry_time,

                    latitude:
                    item.latitude,

                    longitude:
                    item.longitude,

                    photo_name:
                    item.photo_name
                }
            ]);

            if(insertResult.error){

                console.log(
                    insertResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            await deleteAttendancePhotoOffline(
                item.photo_name
            );

        }catch(err){

            console.log(
                err
            );

            notSynced.push(
                item
            );
        }
    }

    if(
        notSynced.length > 0
    ){

        localStorage.setItem(
            'offline_attendance',
            JSON.stringify(
                notSynced
            )
        );

    }else{

        localStorage.removeItem(
            'offline_attendance'
        );
    }
    updateOfflineCounter();
}

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){
        return;
    }

    try{

        let allRecords = [];

        /*
        دریافت ترددهای آنلاین از Supabase
        */

       if(navigator.onLine && supabaseClient){

    const { data } =
    await supabaseClient

            .from('eagle')
            .select('*')
            .eq(
                'personnel_code',
                personnel_code
            )
            .order(
                'id',
                {
                    ascending:false
                }
            );

            if(data){
                allRecords =
                allRecords.concat(
                    data
                );
            }
        }

        /*
        اضافه کردن ترددهای آفلاین ذخیره‌شده در موبایل
        */

        const offlineAttendance =
        JSON.parse(
            localStorage.getItem(
                'offline_attendance'
            ) || '[]'
        );

        const myOfflineRecords =
        offlineAttendance.filter(
            item =>
            item.personnel_code === personnel_code
        );

        allRecords =
        allRecords.concat(
            myOfflineRecords
        );

        if(allRecords.length === 0){

            document.getElementById(
                'myRecords'
            ).innerHTML =
            '<div class="record">هنوز ترددی ثبت نشده است.</div>';

            return;
        }

        /*
        گروه‌بندی بر اساس روز
        */

        const groupedDays = {};

        allRecords.forEach(item => {

            if(!item.entry_time){
                return;
            }

            const day =
            item.entry_time.split('،')[0];

            if(!groupedDays[day]){
                groupedDays[day] = [];
            }

            groupedDays[day].push(item);
        });

        /*
        مرتب‌سازی روزها بر اساس آخرین تردد همان روز
        */

        const sortedDays =
        Object.keys(groupedDays)
        .sort((a,b) => {

            const lastA =
            groupedDays[a][0];

            const lastB =
            groupedDays[b][0];

            const idA =
            lastA.id || 0;

            const idB =
            lastB.id || 0;

            return idB - idA;
        })
        .slice(0,3);

        let html = '';

        sortedDays.forEach(day => {

            const records =
            groupedDays[day];

            /*
            چون اطلاعات آنلاین با id نزولی آمده،
            ولی اطلاعات آفلاین id ندارد،
            اینجا با همان ترتیب موجود کار می‌کنیم.
            */

            records.sort((a,b) => {

                const idA =
                a.id || 0;

                const idB =
                b.id || 0;

                return idA - idB;
            });

            const firstRecord =
            records[0];

            const lastRecord =
            records[
                records.length - 1
            ];

            html += `
            <div class="record">

                <p>
                    📅 تاریخ:
                    ${day}
                </p>

                <hr>

                <p>
                    🟢 اولین ورود:
                    ${firstRecord.entry_time}
                </p>
            `;

            if(records.length > 1){

                html += `
                <p>
                    🔴 آخرین خروج:
                    ${lastRecord.entry_time}
                </p>
                `;

            }else{

                html += `
                <p>
                    🔴 آخرین خروج:
                    هنوز ثبت نشده
                </p>
                `;
            }

            html += `
            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}


</script>

<div id="diagnosticBox">
  <h3>تشخیص وضعیت برنامه</h3>

  <div id="diagnosticResults">
    <div class="diag-row">
      <div class="diag-title">وضعیت</div>
      <div class="diag-result diag-info">برای بررسی، دکمه «اجرای تشخیص» را بزنید.</div>
    </div>
  </div>

  <div id="diagnosticActions">
    <button type="button" onclick="runAppDiagnostics()">اجرای تشخیص</button>
    <button type="button" onclick="testGPSNow()" class="secondary">تست GPS</button>
    <button type="button" onclick="testCameraNow()" class="secondary">تست دوربین</button>
    <button type="button" onclick="copyDiagnosticReport()" class="secondary">کپی گزارش</button>
    <button type="button" onclick="clearDiagnosticLog()" class="danger">پاک کردن لاگ</button>
  </div>

  <pre id="diagnosticLog"></pre>

<script>
(function () {
  window.__diagnosticReport = [];

  function nowTime() {
    return new Date().toLocaleString('fa-IR');
  }

  function logDiagnostic(message, data) {
    const logEl = document.getElementById('diagnosticLog');
    const text = '[' + new Date().toISOString() + '] ' + message +
      (data ? '\n' + safeStringify(data) : '') + '\n';

    window.__diagnosticReport.push(text);

    if (logEl) {
      logEl.textContent += text;
      logEl.scrollTop = logEl.scrollHeight;
    }

    try {
      console.log('[DIAGNOSTIC]', message, data || '');
    } catch (e) {}
  }

  function safeStringify(data) {
    try {
      return JSON.stringify(data, null, 2);
    } catch (e) {
      return String(data);
    }
  }

  function statusClass(type) {
    if (type === 'ok') return 'diag-ok';
    if (type === 'warn') return 'diag-warn';
    if (type === 'error') return 'diag-error';
    return 'diag-info';
  }

  function addRow(title, text, type) {
    const container = document.getElementById('diagnosticResults');
    if (!container) return;

    const row = document.createElement('div');
    row.className = 'diag-row';

    const titleEl = document.createElement('div');
    titleEl.className = 'diag-title';
    titleEl.textContent = title;

    const resultEl = document.createElement('div');
    resultEl.className = 'diag-result ' + statusClass(type);
    resultEl.textContent = text;

    row.appendChild(titleEl);
    row.appendChild(resultEl);
    container.appendChild(row);
  }

  function resetRows() {
    const container = document.getElementById('diagnosticResults');
    if (container) {
      container.innerHTML = '';
    }
  }

  async function checkPermission(name) {
    if (!navigator.permissions || !navigator.permissions.query) {
      return {
        supported: false,
        state: 'unsupported'
      };
    }

    try {
      const result = await navigator.permissions.query({ name: name });
      return {
        supported: true,
        state: result.state
      };
    } catch (err) {
      return {
        supported: false,
        state: 'unsupported',
        error: err.message
      };
    }
  }

  async function checkServiceWorker() {
    const info = {
      supported: 'serviceWorker' in navigator,
      controller: false,
      registrations: []
    };

    if (!info.supported) {
      return info;
    }

    try {
      info.controller = !!navigator.serviceWorker.controller;

      if (navigator.serviceWorker.getRegistrations) {
        const regs = await navigator.serviceWorker.getRegistrations();
        info.registrations = regs.map(function (reg) {
          return {
            scope: reg.scope,
            active: !!reg.active,
            installing: !!reg.installing,
            waiting: !!reg.waiting
          };
        });
      }
    } catch (err) {
      info.error = err.message;
    }

    return info;
  }

  async function checkCaches() {
    const info = {
      supported: 'caches' in window,
      keys: []
    };

    if (!info.supported) {
      return info;
    }

    try {
      info.keys = await caches.keys();
    } catch (err) {
      info.error = err.message;
    }

    return info;
  }

  function checkSupabase() {
    const result = {
      supabaseGlobalExists: typeof window.supabase !== 'undefined',
      supabaseClientExists: typeof window.supabaseClient !== 'undefined'
    };

    if (result.supabaseGlobalExists) {
      result.supabaseType = typeof window.supabase;
    }

    if (result.supabaseClientExists) {
      result.supabaseClientType = typeof window.supabaseClient;
    }

    return result;
  }

  function checkAttendanceFunction() {
    return {
      saveAttendanceType: typeof window.saveAttendance,
      exists: typeof window.saveAttendance === 'function'
    };
  }

  function findAttendanceInput() {
    const possibleSelectors = [
      '#attendancePhoto',
      '#attendanceInput',
      '#photoInput',
      '#cameraInput',
      'input[type="file"][accept*="image"]',
      'input[type="file"][capture]',
      'input[type="file"]'
    ];

    for (let i = 0; i < possibleSelectors.length; i++) {
      const el = document.querySelector(possibleSelectors[i]);
      if (el) {
        return {
          found: true,
          selector: possibleSelectors[i],
          id: el.id || '',
          name: el.name || '',
          accept: el.getAttribute('accept') || '',
          capture: el.getAttribute('capture') || '',
          display: window.getComputedStyle(el).display,
          disabled: !!el.disabled
        };
      }
    }

    return {
      found: false
    };
  }

  async function runAppDiagnostics() {
    resetRows();

    addRow('زمان بررسی', nowTime(), 'info');

    logDiagnostic('Diagnostic started');

    // 1. Internet
    const online = navigator.onLine;
    addRow(
      'اینترنت',
      online ? 'آنلاین' : 'آفلاین',
      online ? 'ok' : 'warn'
    );
    logDiagnostic('navigator.onLine', { online: online });

    // 2. Secure Context
    const secure = window.isSecureContext;
    const protocol = location.protocol;
    addRow(
      'HTTPS / امنیت صفحه',
      secure ? 'مجاز - Secure Context' : 'نامجاز - GPS و دوربین ممکن است کار نکنند',
      secure ? 'ok' : 'error'
    );
    logDiagnostic('Secure Context', {
      isSecureContext: secure,
      protocol: protocol,
      href: location.href
    });

    // 3. Geolocation support
    const geoSupported = 'geolocation' in navigator;
    addRow(
      'پشتیبانی GPS مرورگر',
      geoSupported ? 'پشتیبانی می‌شود' : 'پشتیبانی نمی‌شود',
      geoSupported ? 'ok' : 'error'
    );
    logDiagnostic('Geolocation support', { supported: geoSupported });

    // 4. Location permission
    const geoPerm = await checkPermission('geolocation');
    let geoPermText = '';
    let geoPermType = 'info';

    if (!geoPerm.supported) {
      geoPermText = 'Permissions API برای Location در این مرورگر قابل بررسی نیست';
      geoPermType = 'warn';
    } else if (geoPerm.state === 'granted') {
      geoPermText = 'دسترسی Location داده شده است';
      geoPermType = 'ok';
    } else if (geoPerm.state === 'prompt') {
      geoPermText = 'هنوز سؤال نشده یا نیازمند تأیید کاربر است';
      geoPermType = 'warn';
    } else if (geoPerm.state === 'denied') {
      geoPermText = 'دسترسی Location مسدود شده است';
      geoPermType = 'error';
    } else {
      geoPermText = geoPerm.state;
      geoPermType = 'warn';
    }

    addRow('Permission موقعیت', geoPermText, geoPermType);
    logDiagnostic('Geolocation permission', geoPerm);

    // 5. Camera / mediaDevices support
    const cameraSupported = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    addRow(
      'پشتیبانی دوربین',
      cameraSupported ? 'getUserMedia پشتیبانی می‌شود' : 'پشتیبانی نمی‌شود یا محدود است',
      cameraSupported ? 'ok' : 'error'
    );
    logDiagnostic('Camera getUserMedia support', { supported: cameraSupported });

    // 6. Camera permission
    const camPerm = await checkPermission('camera');
    let camPermText = '';
    let camPermType = 'info';

    if (!camPerm.supported) {
      camPermText = 'Permissions API برای Camera در این مرورگر قابل بررسی نیست';
      camPermType = 'warn';
    } else if (camPerm.state === 'granted') {
      camPermText = 'دسترسی Camera داده شده است';
      camPermType = 'ok';
    } else if (camPerm.state === 'prompt') {
      camPermText = 'هنوز سؤال نشده یا نیازمند تأیید کاربر است';
      camPermType = 'warn';
    } else if (camPerm.state === 'denied') {
      camPermText = 'دسترسی Camera مسدود شده است';
      camPermType = 'error';
    } else {
      camPermText = camPerm.state;
      camPermType = 'warn';
    }

    addRow('Permission دوربین', camPermText, camPermType);
    logDiagnostic('Camera permission', camPerm);

    // 7. Service Worker
    const swInfo = await checkServiceWorker();

    if (!swInfo.supported) {
      addRow('Service Worker', 'پشتیبانی نمی‌شود', 'error');
    } else if (swInfo.registrations && swInfo.registrations.length > 0) {
      addRow(
        'Service Worker',
        'ثبت شده - تعداد: ' + swInfo.registrations.length + 
        (swInfo.controller ? ' - فعال روی صفحه' : ' - ثبت شده ولی controller ندارد'),
        swInfo.controller ? 'ok' : 'warn'
      );
    } else {
      addRow('Service Worker', 'هیچ Service Worker ثبت نشده است', 'warn');
    }

    logDiagnostic('Service Worker info', swInfo);

    // 8. Cache API
    const cacheInfo = await checkCaches();

    if (!cacheInfo.supported) {
      addRow('Cache API', 'پشتیبانی نمی‌شود', 'error');
    } else if (cacheInfo.keys && cacheInfo.keys.length > 0) {
      addRow('Cache آفلاین', 'Cache موجود است: ' + cacheInfo.keys.join(', '), 'ok');
    } else {
      addRow('Cache آفلاین', 'هیچ Cache ثبت نشده است', 'warn');
    }

    logDiagnostic('Cache info', cacheInfo);

    // 9. Supabase
    const supabaseInfo = checkSupabase();

    if (supabaseInfo.supabaseGlobalExists || supabaseInfo.supabaseClientExists) {
      addRow(
        'Supabase',
        'شناسایی شد' +
        ' | supabase: ' + supabaseInfo.supabaseGlobalExists +
        ' | supabaseClient: ' + supabaseInfo.supabaseClientExists,
        'ok'
      );
    } else {
      addRow(
        'Supabase',
        'در window شناسایی نشد. اگر آفلاین هستید و CDN استفاده شده باشد، احتمال خطا وجود دارد.',
        'warn'
      );
    }

    logDiagnostic('Supabase info', supabaseInfo);

    // 10. saveAttendance
    const attendanceFn = checkAttendanceFunction();

    addRow(
      'تابع saveAttendance',
      attendanceFn.exists ? 'وجود دارد' : 'وجود ندارد یا global نیست',
      attendanceFn.exists ? 'ok' : 'error'
    );

    logDiagnostic('saveAttendance check', attendanceFn);

    // 11. input camera/file
    const inputInfo = findAttendanceInput();

    if (inputInfo.found) {
      addRow(
        'Input عکس/دوربین',
        'پیدا شد: ' + inputInfo.selector +
        (inputInfo.disabled ? ' - ولی disabled است' : ''),
        inputInfo.disabled ? 'error' : 'ok'
      );
    } else {
      addRow(
        'Input عکس/دوربین',
        'هیچ input فایل/عکس پیدا نشد',
        'error'
      );
    }

    logDiagnostic('Attendance photo input check', inputInfo);

    // 12. localStorage
    try {
      localStorage.setItem('__diag_test__', 'ok');
      const val = localStorage.getItem('__diag_test__');
      localStorage.removeItem('__diag_test__');

      addRow(
        'localStorage',
        val === 'ok' ? 'قابل استفاده است' : 'مشکل در خواندن/نوشتن',
        val === 'ok' ? 'ok' : 'error'
      );

      logDiagnostic('localStorage test', { ok: val === 'ok' });
    } catch (err) {
      addRow('localStorage', 'خطا: ' + err.message, 'error');
      logDiagnostic('localStorage error', { message: err.message });
    }

    // 13. IndexedDB
    const indexedSupported = 'indexedDB' in window;

    addRow(
      'IndexedDB',
      indexedSupported ? 'پشتیبانی می‌شود' : 'پشتیبانی نمی‌شود',
      indexedSupported ? 'ok' : 'error'
    );

    logDiagnostic('IndexedDB support', { supported: indexedSupported });

    addRow('نتیجه', 'تشخیص کامل شد. اگر لازم است GPS یا دوربین را جداگانه تست کنید.', 'info');

    logDiagnostic('Diagnostic completed');
  }

  function testGPSNow() {
    logDiagnostic('GPS test started');

    if (!('geolocation' in navigator)) {
      alert('مرورگر از GPS/Location پشتیبانی نمی‌کند.');
      logDiagnostic('GPS test failed: geolocation not supported');
      return;
    }

    if (!window.isSecureContext) {
      alert('برای دریافت GPS، صفحه باید روی HTTPS باشد.');
      logDiagnostic('GPS test failed: insecure context', {
        protocol: location.protocol,
        href: location.href
      });
      return;
    }

    alert('در حال دریافت موقعیت مکانی. لطفاً اگر مرورگر سؤال کرد، Allow را بزنید.');

    navigator.geolocation.getCurrentPosition(
      function (position) {
        const coords = position.coords;

        const result = {
          latitude: coords.latitude,
          longitude: coords.longitude,
          accuracy: coords.accuracy,
          altitude: coords.altitude,
          altitudeAccuracy: coords.altitudeAccuracy,
          heading: coords.heading,
          speed: coords.speed,
          timestamp: position.timestamp
        };

        logDiagnostic('GPS test success', result);

        alert(
          'GPS دریافت شد:\n' +
          'Latitude: ' + coords.latitude + '\n' +
          'Longitude: ' + coords.longitude + '\n' +
          'Accuracy: ' + Math.round(coords.accuracy) + ' متر'
        );
      },
      function (error) {
        let message = '';

        if (error.code === error.PERMISSION_DENIED) {
          message = 'دسترسی Location رد شده یا مسدود است.';
        } else if (error.code === error.POSITION_UNAVAILABLE) {
          message = 'موقعیت مکانی در دسترس نیست. GPS/Location را بررسی کنید.';
        } else if (error.code === error.TIMEOUT) {
          message = 'دریافت موقعیت مکانی زمان‌بر شد و timeout خورد.';
        } else {
          message = 'خطای نامشخص در GPS.';
        }

        logDiagnostic('GPS test error', {
          code: error.code,
          message: error.message,
          readableMessage: message
        });

        alert(message + '\n\nجزئیات:\n' + error.message);
      },
      {
        enableHighAccuracy: false,
        timeout: 20000,
        maximumAge: 300000
      }
    );
  }

  async function testCameraNow() {
    logDiagnostic('Camera test started');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('مرورگر از دسترسی مستقیم به دوربین پشتیبانی نمی‌کند.');
      logDiagnostic('Camera test failed: getUserMedia not supported');
      return;
    }

    if (!window.isSecureContext) {
      alert('برای دسترسی به دوربین، صفحه باید روی HTTPS باشد.');
      logDiagnostic('Camera test failed: insecure context', {
        protocol: location.protocol,
        href: location.href
      });
      return;
    }

    try {
      alert('در حال تست دوربین. اگر مرورگر سؤال کرد، Allow را بزنید.');

      const stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });

      const tracks = stream.getTracks();
      tracks.forEach(function (track) {
        track.stop();
      });

      logDiagnostic('Camera test success', {
        tracks: tracks.map(function (t) {
          return {
            kind: t.kind,
            label: t.label,
            readyState: t.readyState
          };
        })
      });

      alert('دوربین قابل دسترسی است.');
    } catch (err) {
      let message = '';

      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        message = 'دسترسی دوربین رد شده یا مسدود است.';
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        message = 'دوربینی پیدا نشد.';
      } else if (err.name === 'NotReadableError') {
        message = 'دوربین توسط برنامه دیگری درگیر است یا قابل خواندن نیست.';
      } else if (err.name === 'OverconstrainedError') {
        message = 'تنظیمات درخواست‌شده با دوربین سازگار نیست.';
      } else if (err.name === 'SecurityError') {
        message = 'به دلیل محدودیت امنیتی، دسترسی به دوربین ممکن نیست.';
      } else {
        message = 'خطای نامشخص در تست دوربین.';
      }

      logDiagnostic('Camera test error', {
        name: err.name,
        message: err.message,
        readableMessage: message
      });

      alert(message + '\n\nجزئیات:\n' + err.name + ': ' + err.message);
    }
  }

  function copyDiagnosticReport() {
    const report = window.__diagnosticReport.join('\n');

    if (!report.trim()) {
      alert('هنوز گزارشی تولید نشده است.');
      return;
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(report).then(function () {
        alert('گزارش تشخیص کپی شد.');
      }).catch(function () {
        fallbackCopy(report);
      });
    } else {
      fallbackCopy(report);
    }
  }

  function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try {
      document.execCommand('copy');
      alert('گزارش تشخیص کپی شد.');
    } catch (err) {
      alert('کپی خودکار ممکن نیست. گزارش در console موجود است.');
      console.log(text);
    }

    document.body.removeChild(textarea);
  }

  function clearDiagnosticLog() {
    window.__diagnosticReport = [];
    const logEl = document.getElementById('diagnosticLog');
    if (logEl) {
      logEl.textContent = '';
    }
  }

  window.runAppDiagnostics = runAppDiagnostics;
  window.testGPSNow = testGPSNow;
  window.testCameraNow = testCameraNow;
  window.copyDiagnosticReport = copyDiagnosticReport;
  window.clearDiagnosticLog = clearDiagnosticLog;

  window.addEventListener('online', function () {
    logDiagnostic('Browser event: online');
  });

  window.addEventListener('offline', function () {
    logDiagnostic('Browser event: offline');
  });

  window.addEventListener('error', function (event) {
    logDiagnostic('Global JavaScript error', {
      message: event.message,
      filename: event.filename,
      lineno: event.lineno,
      colno: event.colno
    });
  });

  window.addEventListener('unhandledrejection', function (event) {
    logDiagnostic('Unhandled Promise rejection', {
      reason: event.reason && event.reason.message ? event.reason.message : String(event.reason)
    });
  });

})();
</script>

</body>
</html>
