
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:green;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}

</style>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="photo"
accept="image/*"
capture="user"
style="display:none"
>

<button
type="button"
id="photoBtn"
onclick="openCamera()"
>
📷 گرفتن عکس
</button>

<button
onclick="saveAttendance()"
>
ثبت ورود
</button>

<div id="status"></div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./face-api/face-api.min.js"></script>
<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'YOUR_SUPABASE_KEY';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);
let personData = null;
window.onload = async function(){

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }
if(savedCode){

    const { data } =

    await supabaseClient

    .from('personnel')

    .select('*')

    .eq(
        'personnel_code',
        savedCode
    )

    .single();

    if(data){

        const remain =

        5 - (data.photo_count || 0);

        if(remain > 0){

            document.getElementById(
                'photoBtn'
            ).innerHTML =

            '📷 گرفتن ' +
            remain +
            ' عکس از چهره';

        }else{

            document.getElementById(
                'photoBtn'
            ).innerHTML =

            '📷 گرفتن عکس';
        }
    }
}
    await sendOfflineData();

    loadMyRecords();
}

function openCamera(){

    document.getElementById(
        'photo'
    ).click();
}

async function saveAttendance(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value;

    const personnel_code =
    document.getElementById(
        'personnel_code'
    ).value;

    const photoFile =
    document.getElementById(
        'photo'
    ).files[0];

    if(
        fullname === '' ||
        personnel_code === ''
    ){

        alert(
            'اطلاعات را کامل وارد کنید'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnel_code
    );

    const { data: person } =
await supabaseClient
.from('personnel')
.select('*')
.eq(
    'personnel_code',
    personnel_code
)
.single();

personData = person;

    if(person && person.photo_locked){

        alert(
            'ثبت عکس برای این پرسنل غیرفعال شده'
        );

        return;
    }

    navigator.geolocation.getCurrentPosition(
    
if(photoFile){

    const image = await faceapi.bufferToImage(photoFile);

    const detection = await faceapi
    .detectSingleFace(
        image,
        new faceapi.TinyFaceDetectorOptions()
    )
    .withFaceLandmarks()
    .withFaceDescriptor();

    if(!detection){

        alert('چهره تشخیص داده نشد');

        return;
    }

    const { data: personData } =

    await supabaseClient
    .from('personnel')
    .select('*')
    .eq(
        'personnel_code',
        personnel_code
    )
    .single();

    if(
        personData &&
        personData.photo_url
    ){

        const savedImage =
        await faceapi.fetchImage(
            personData.photo_url
        );

        const savedDetection =
        await faceapi
        .detectSingleFace(
            savedImage,
            new faceapi.TinyFaceDetectorOptions()
        )
        .withFaceLandmarks()
        .withFaceDescriptor();

        if(savedDetection){

            const distance =
            faceapi.euclideanDistance(
                detection.descriptor,
                savedDetection.descriptor
            );

            if(distance > 0.5){

                alert(
                    'چهره مطابقت ندارد'
                );

                return;
            }
        }
    }
}


    async position => {

        const latitude =
        position.coords.latitude;

        const longitude =
        position.coords.longitude;

        const now =
        new Date().toLocaleString(
            'fa-IR'
        );

        if(!navigator.onLine){

            let offlineData =

            JSON.parse(

                localStorage.getItem(
                    'offline_attendance'
                ) || '[]'
            );

            offlineData.push({

                fullname:
                fullname,

                personnel_code:
                personnel_code,

                entry_time:
                now,

                latitude:
                latitude,

                longitude:
                longitude
            });

            localStorage.setItem(

                'offline_attendance',

                JSON.stringify(
                    offlineData
                )
            );

            document.getElementById(
                'status'
            ).innerHTML =

            'بدون اینترنت ذخیره شد';

            return;
        }

        let photo_url = '';

        if(photoFile){

            const fileName =
            Date.now() + '.jpg';

            const { error: uploadError } =

            await supabaseClient.storage

            .from('photo')

            .upload(

                fileName,

                photoFile,

                {
                    upsert:true
                }
            );

            if(!uploadError){

                const { data } =

                supabaseClient.storage

                .from('photo')

                .getPublicUrl(
                    fileName
                );

                photo_url =
                data.publicUrl;

                const newCount =
                person
                ?
                (person.photo_count || 0) + 1
                :
                1;

                await supabaseClient
                .from('personnel')
                .upsert({

                    personnel_code,

                    photo_count:newCount,

                    photo_locked:
                    newCount >= 5,

                    photo_url

                });
            }
        }

        const { error } =

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                fullname,

                personnel_code:
                personnel_code,

                entry_time:
                now,

                latitude:
                latitude.toString(),

                longitude:
                longitude.toString(),

                photo_url:
                photo_url
            }
        ]);

        if(error){

            console.log(error);

            document.getElementById(
                'status'
            ).innerHTML =

            'خطا در ثبت اطلاعات';

        }else{

            document.getElementById(
                'status'
            ).innerHTML =

            'اطلاعات با موفقیت ثبت شد';

            document.getElementById(
                'photo'
            ).value = '';
         if(personData){

    const remain =

    5 - (personData.photo_count || 0) - 1;

    if(remain > 0){

        document.getElementById(
            'photoBtn'
        ).innerHTML =

        '📷 گرفتن ' +
        remain +
        ' عکس از چهره';

    }else{

        document.getElementById(
            'photoBtn'
        ).innerHTML =

        '📷 گرفتن عکس';
    }
}
            loadMyRecords();
        }

    });
}

async function sendOfflineData(){

    if(!navigator.onLine){

        return;
    }

    let offlineData =

    JSON.parse(

        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineData.length === 0
    ){

        return;
    }

    for(
        let item of offlineData
    ){

        const { error } =

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                item.fullname,

                personnel_code:
                item.personnel_code,

                entry_time:
                item.entry_time,

                latitude:
                item.latitude.toString(),

                longitude:
                item.longitude.toString(),

                photo_url:''
            }
        ]);

        if(error){

            console.log(error);

            return;
        }
    }

    localStorage.removeItem(
        'offline_attendance'
    );

    document.getElementById(
        'status'
    ).innerHTML =

    'اطلاعات آفلاین ارسال شد';
}

async function loadMyRecords(){

    const personnel_code =

    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){

        return;
    }

    const { data, error } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .eq(
        'personnel_code',
        personnel_code
    )

    .order(
        'id',
        {
            ascending:false
        }
    );

    if(error){

        console.log(error);

        return;
    }

    let html = `

    <h3 style="
    margin-top:30px;
    text-align:center;
    color:#1a2a6c;
    ">
    ۳ روز اخیر
    </h3>
    `;

    const grouped = {};

    data.forEach(item => {

        const fullDate =
        item.entry_time;

        const onlyDate =
        fullDate.substring(0,10);

        if(!grouped[onlyDate]){

            grouped[onlyDate] = [];
        }

        grouped[onlyDate].push(item);
    });

    const dates =
    Object.keys(grouped).slice(0,3);

    dates.forEach(date => {

        const records =
        grouped[date];

        const first =
        records[
            records.length - 1
        ];

        const last =
        records[0];

        html += `

        <div class="record">

        <h4>
        ${date}
        </h4>

        <p>
        اولین تردد:
        ${first.entry_time}
        </p>

        <p>
        آخرین تردد:
        ${last.entry_time}
        </p>

        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register(
        './sw.js'
    );
}

</script>

</body>

</html>
