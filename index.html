/* GPS */

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        navigator.geolocation
        .getCurrentPosition(

            position => {
alert(
    'GPS OK\n' +
    position.coords.latitude +'\n' +
    position.coords.longitude 
    );
                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude
                });

            },

            ()=>{
            alert('GPS ERROR');
                resolve({
                    lat:null,
                    lng:null
                });

            },

            {
                enableHighAccuracy:true,
                timeout:7000
            }
        );
    });
}

/* فشرده سازی عکس */

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(e){

            const img =
            new Image();

            img.src =
            e.target.result;

            img.onload = function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 600;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(

                    blob => {

                        resolve(blob);

                    },

                    'image/jpeg',

                    0.7
                );
            };
        };
    });
}

/* ارسال اطلاعات آفلاین */

async function sendOfflineData(){

    const isOnline =

    document.getElementById(
        'networkStatus'
    ).classList.contains(
        'online'
    );

    if(!isOnline){

        return;
    }

    let offlineData =

    JSON.parse(

        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(offlineData.length === 0){

        return;
    }

    for(let item of offlineData){

        try{

            await supabaseClient
            .from('eagle')
            .insert([item]);

        }catch(err){

            console.log(err);
        }
    }

    localStorage.removeItem(
        'offline_attendance'
    );
}

/* سوابق */

async function loadRecords(){

    const personnelCode =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnelCode){

        return;
    }

    const isOnline =

    document.getElementById(
        'networkStatus'
    ).classList.contains(
        'online'
    );

    if(!isOnline){

        return;
    }

    try{

        const { data } =
        await supabaseClient
        .from('eagle')
        .select('*')
        .eq(
            'personnel_code',
            personnelCode
        )
        .order(
            'id',
            {
                ascending:false
            }
        );

        if(!data){

            return;
        }

        let html = '';

        data.slice(0,5).forEach(item => {

            html += `
            <div class="record">

            <p>
            زمان:
            ${item.entry_time}
            </p>

            <p>
            GPS:
            ${item.latitude || '-'}
            ,
            ${item.longitude || '-'}
            </p>

            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}
