<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیستم ثبت تردد پرسنل</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:18px;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

#captureBtn{
    background:#00897b;
}

#photoBtn{
    background:#1a2a6c;
}

button:disabled{
    background:#999 !important;
    cursor:not-allowed;
}

#photoCounter{
    text-align:center;
    margin-top:15px;
    margin-bottom:15px;
    font-weight:bold;
    color:#1a2a6c;
    font-size:20px;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
    font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<div id="photoContainer"></div>

<button
id="captureBtn"
type="button"
onclick="captureReferencePhoto()"
>
📸 گرفتن 3 عکس مرجع
</button>

<div id="photoCounter">
3 عکس باقی مانده
</div>

<button
id="photoBtn"
type="button"
onclick="saveAttendance()"
>
📷 ثبت ورود
</button>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

/* کلید واقعی ANON را قرار بده */
const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let remainingPhotos = 3;

function createPhotoInput(){

    const container =
    document.getElementById(
        'photoContainer'
    );

    container.innerHTML = `
    <input
    type="file"
    id="photo"
    accept="image/*"
    capture="user"
    style="display:none"
    >
    `;
}

createPhotoInput();

function lockPersonnelFields(){

    const fullname =
    document.getElementById(
        'fullname'
    );

    const code =
    document.getElementById(
        'personnel_code'
    );

    fullname.readOnly = true;
    code.readOnly = true;

    fullname.style.background =
    '#eee';

    code.style.background =
    '#eee';
}

function updatePhotoCounter(){

    const counter =
    document.getElementById(
        'photoCounter'
    );

    if(remainingPhotos > 0){

        counter.innerHTML =
        remainingPhotos +
        ' عکس باقی مانده';

    }else{

        counter.innerHTML =
        '✅ عکس‌های مرجع کامل شد';

        document.getElementById(
            'captureBtn'
        ).disabled = true;
    }
}

window.onload = async function(){

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    if(savedName && savedCode){

        lockPersonnelFields();

        const { data } =
        await supabaseClient
        .from('personnel')
        .select('*')
        .eq(
            'personnel_code',
            savedCode
        )
        .maybeSingle();

        if(data){

            remainingPhotos =
            Math.max(
                0,
                3 - (data.photo_count || 0)
            );

            updatePhotoCounter();
        }
    }

    loadMyRecords();
};

async function captureReferencePhoto(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'ابتدا اطلاعات را وارد کنید'
        );

        return;
    }

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName && savedName !== fullname){

        alert('نام قابل تغییر نیست');
        return;
    }

    if(savedCode && savedCode !== personnelCode){

        alert('کد پرسنلی قابل تغییر نیست');
        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockPersonnelFields();

    if(remainingPhotos <= 0){

        alert(
            'عکس‌های مرجع کامل شده‌اند'
        );

        return;
    }

    createPhotoInput();

    const photoInput =
    document.getElementById(
        'photo'
    );

    photoInput.onchange =
    async function(e){

        const file =
        e.target.files[0];

        if(!file){
            return;
        }

        try{

            document.getElementById(
                'captureBtn'
            ).disabled = true;

            const extension =
            file.name.split('.').pop();

            const fileName =
            personnelCode +
            '_' +
            Date.now() +
            '.' +
            extension;

            const uploadPromise =
            supabaseClient.storage
            .from('reference-photos')
            .upload(
                fileName,
                file,
                {
                    cacheControl:'3600',
                    upsert:false
                }
            );

            const timeoutPromise =
            new Promise((_, reject)=>
                setTimeout(
                    ()=>reject(
                        new Error(
                            'timeout'
                        )
                    ),
                    30000
                )
            );

            const result =
            await Promise.race([
                uploadPromise,
                timeoutPromise
            ]);

            if(result.error){

                console.log(result.error);

                alert(
                    'خطا در آپلود:\n' +
                    result.error.message
                );

                document.getElementById(
                    'captureBtn'
                ).disabled = false;

                return;
            }

            remainingPhotos--;

            const { data: existingPerson } =
            await supabaseClient
            .from('personnel')
            .select('*')
            .eq(
                'personnel_code',
                personnelCode
            )
            .maybeSingle();

            if(existingPerson){

                await supabaseClient
                .from('personnel')
                .update({
                    fullname:fullname,
                    photo_count:
                    3 - remainingPhotos
                })
                .eq(
                    'personnel_code',
                    personnelCode
                );

            }else{

                await supabaseClient
                .from('personnel')
                .insert([{
                    personnel_code:
                    personnelCode,

                    fullname:
                    fullname,

                    photo_count:
                    3 - remainingPhotos
                }]);
            }

            updatePhotoCounter();

            if(remainingPhotos > 0){

                alert(
                    'عکس ذخیره شد'
                );

                document.getElementById(
                    'captureBtn'
                ).disabled = false;

            }else{

                alert(
                    'ثبت 3 عکس کامل شد'
                );
            }

        }catch(err){

            console.log(err);

            alert(
                'خطا:\n' + err.message
            );

            document.getElementById(
                'captureBtn'
            ).disabled = false;
        }
    };

    photoInput.click();
}

async function saveAttendance(){

    if(remainingPhotos > 0){

        alert(
            'ابتدا 3 عکس مرجع ثبت کنید'
        );

        return;
    }

    alert(
        'سیستم آماده ثبت ورود است'
    );
}

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){
        return;
    }

    const { data } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .eq(
        'personnel_code',
        personnel_code
    )
    .order(
        'id',
        {
            ascending:false
        }
    );

    if(!data){
        return;
    }

    let html = '';

    data.slice(0,3).forEach(item=>{

        html += `
        <div class="record">
        <p>
        ${item.entry_time}
        </p>
        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

</script>

</body>
</html>
