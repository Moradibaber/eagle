 <!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.status{
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.online{
    color:green;
}

.offline{
    color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<div
id="networkStatus"
class="status"
>
🟢 آنلاین
</div>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="attendancePhoto"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="attendanceBtn"
onclick="saveAttendance()"
>
📷 ثبت تردد
</button>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* وضعیت اینترنت */

function updateNetworkStatus(){

    const status =
    document.getElementById(
        'networkStatus'
    );

    if(navigator.onLine){

        status.innerHTML =
        '🟢 آنلاین';

        status.className =
        'status online';

        syncOfflineAttendance();

    }else{

        status.innerHTML =
        '🔴 آفلاین';

        status.className =
        'status offline';
    }
}

window.addEventListener(
    'online',
    updateNetworkStatus
);

window.addEventListener(
    'offline',
    updateNetworkStatus
);

/* قفل اطلاعات */

function lockPersonnelFields(){

    const fullname =
    document.getElementById(
        'fullname'
    );

    const code =
    document.getElementById(
        'personnel_code'
    );

    fullname.readOnly = true;
    code.readOnly = true;

    fullname.style.background =
    '#eee';

    code.style.background =
    '#eee';
}

/* لود اولیه */

window.onload = async function(){

    updateNetworkStatus();

    let savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    let savedCode =
    localStorage.getItem(
        'employee_code'
    );

    /*
    اگر localStorage پاک شده بود
    */

    if(!savedCode){

        const lastCode =
        prompt(
            'کد پرسنلی را وارد کنید'
        );

        if(lastCode){

            try{

                const { data } =
                await supabaseClient
                .from('personnel')
                .select('*')
                .eq(
                    'personnel_code',
                    lastCode
                )
                .maybeSingle();

                if(data){

                    savedName =
                    data.fullname;

                    savedCode =
                    data.personnel_code;

                    localStorage.setItem(
                        'employee_fullname',
                        savedName
                    );

                    localStorage.setItem(
                        'employee_code',
                        savedCode
                    );
                }

            }catch(err){

                console.log(err);
            }
        }
    }

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    /*
    قفل
    */

    if(savedName && savedCode){

        lockPersonnelFields();
    }

    loadMyRecords();
};

/* فشرده سازی */

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(e){

            const img =
            new Image();

            img.src =
            e.target.result;

            img.onload = function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 500;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(
                    blob => {

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.60
                );
            };
        };
    });
}

/* GPS */

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        navigator.geolocation
        .getCurrentPosition(

            position => {

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude
                });
            },

            () => {

                resolve({
                    lat:null,
                    lng:null
                });
            },

            {
                enableHighAccuracy:true,
                timeout:7000
            }
        );
    });
}

/* ثبت تردد */

async function saveAttendance(){

    let fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    let personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'اطلاعات را وارد کنید'
        );

        return;
    }

    /*
    ذخیره در دیتابیس
    */

    await supabaseClient
    .from('personnel')
    .upsert([{

        personnel_code:
        personnelCode,

        fullname:
        fullname

    }]);

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockPersonnelFields();

    /*
    دوربین
    */

    const attendanceInput =
    document.getElementById(
        'attendancePhoto'
    );

    attendanceInput.value = '';

    attendanceInput.onchange =
    async function(e){

        try{

            const file =
            e.target.files[0];

            if(!file){
                return;
            }

            /*
            بعد عکس GPS
            */

            const location =
            await getLocation();

            const compressedFile =
            await compressImage(file);

            const reader =
            new FileReader();

            reader.readAsDataURL(
                compressedFile
            );

            reader.onloadend =
            async function(){

                const base64data =
                reader.result;

                const fileName =
                'attendance_' +
                personnelCode +
                '_' +
                Date.now() +
                '.jpg';

                const attendanceData = {

                    personnel_code:
                    personnelCode,

                    fullname:
                    fullname,

                    entry_time:
                    new Date()
                    .toLocaleString(
                        'fa-IR'
                    ),

                    latitude:
                    location.lat,

                    longitude:
                    location.lng,

                    photo_name:
                    fileName,

                    photo_base64:
                    base64data
                };

                /*
                آفلاین
                */

                if(!navigator.onLine){

                    let offline =
                    JSON.parse(
                        localStorage.getItem(
                            'offline_attendance'
                        ) || '[]'
                    );

                    offline.push(
                        attendanceData
                    );

                    localStorage.setItem(
                        'offline_attendance',
                        JSON.stringify(
                            offline
                        )
                    );

                    alert(
                        'تردد آفلاین ذخیره شد'
                    );

                    return;
                }

                await uploadAttendance(
                    attendanceData
                );
            };

        }catch(err){

            alert(
                err.message
            );
        }
    };

    attendanceInput.setAttribute(
        'capture',
        'user'
    );

    attendanceInput.click();
}

/* آپلود */

async function uploadAttendance(data){

    try{

        const response =
        await fetch(
            data.photo_base64
        );

        const blob =
        await response.blob();

        const uploadResult =
        await supabaseClient.storage
        .from('reference-photos')
        .upload(
            'attendance/' +
            data.photo_name,
            blob,
            {
                upsert:true,
                contentType:'image/jpeg'
            }
        );

        if(uploadResult.error){

            alert(
                uploadResult.error.message
            );

            return;
        }

        const insertResult =
        await supabaseClient
        .from('eagle')
        .insert([{

            personnel_code:
            data.personnel_code,

            fullname:
            data.fullname,

            entry_time:
            data.entry_time,

            latitude:
            data.latitude,

            longitude:
            data.longitude,

            photo_name:
            data.photo_name

        }]);

        if(insertResult.error){

            alert(
                insertResult.error.message
            );

            return;
        }

        alert(
            'تردد ثبت شد'
        );

        loadMyRecords();

    }catch(err){

        alert(
            err.message
        );
    }
}

/* ارسال آفلاین */

async function syncOfflineAttendance(){

    if(!navigator.onLine){
        return;
    }

    let offline =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(offline.length === 0){
        return;
    }

    for(const item of offline){

        await uploadAttendance(
            item
        );
    }

    localStorage.removeItem(
        'offline_attendance'
    );
}

/* سوابق */

async function loadMyRecords(){

    const personnelCode =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnelCode){
        return;
    }

    try{

        const { data } =
        await supabaseClient
        .from('eagle')
        .select('*')
        .eq(
            'personnel_code',
            personnelCode
        )
        .order(
            'id',
            {
                ascending:false
            }
        );

        if(!data){
            return;
        }

        let html = '';

        data.slice(0,5).forEach(item => {

            html += `
            <div class="record">

                <p>
                زمان:
                ${item.entry_time}
                </p>

                <p>
                GPS:
                ${item.latitude || '-'}
                ,
                ${item.longitude || '-'}
                </p>

            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}

</script>

</body>
</html>
