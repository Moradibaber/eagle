
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:green;
}

.status{
    text-align:center;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-weight:bold;
}

.online{
    background:green;
}

.offline{
    background:red;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

#loading{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#1a2a6c;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد
</h2>

<div
id="networkStatus"
class="status online"
>
🟢 آنلاین
</div>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="attendancePhoto"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="attendanceBtn"
type="button"
>
📷 ثبت تردد
</button>

<div id="loading">
در حال ثبت اطلاعات...
</div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* وضعیت شبکه */

function updateNetworkStatus(){

    const status =
    document.getElementById(
        'networkStatus'
    );

    if(navigator.onLine){

        status.innerHTML =
        '🟢 آنلاین';

        status.className =
        'status online';

    }else{

        status.innerHTML =
        '🔴 آفلاین';

        status.className =
        'status offline';
    }
}

window.addEventListener(
    'online',
    updateNetworkStatus
);

window.addEventListener(
    'offline',
    updateNetworkStatus
);

/* قفل فیلدها */

function lockFields(){

    document.getElementById(
        'fullname'
    ).readOnly = true;

    document.getElementById(
        'personnel_code'
    ).readOnly = true;

    document.getElementById(
        'fullname'
    ).style.background = '#eee';

    document.getElementById(
        'personnel_code'
    ).style.background = '#eee';
}

/* شروع */

window.onload = async function(){

    updateNetworkStatus();

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    if(savedName && savedCode){

        lockFields();
    }

    await sendOfflineData();

    loadRecords();
};

/* GPS */

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        navigator.geolocation
        .getCurrentPosition(

            position => {

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude
                });

            },

            () => {

                resolve({
                    lat:null,
                    lng:null
                });

            },

            {
                enableHighAccuracy:true,
                timeout:7000
            }
        );
    });
}

/* فشرده سازی عکس */

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(e){

            const img =
            new Image();

            img.src =
            e.target.result;

            img.onload = function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 600;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(
                    blob => {

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.7
                );
            };
        };
    });
}

/* ثبت تردد */

document.getElementById(
    'attendanceBtn'
).onclick = function(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'اطلاعات را وارد کنید'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockFields();

    const input =
    document.getElementById(
        'attendancePhoto'
    );

    input.value = '';

    input.onchange =
    async function(e){

        try{

            document.getElementById(
                'loading'
            ).style.display =
            'block';

            const file =
            e.target.files[0];

            if(!file){

                document.getElementById(
                    'loading'
                ).style.display =
                'none';

                return;
            }

            const location =
            await getLocation();

            const compressed =
            await compressImage(file);

            const fileName =
            'attendance_' +
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            /* آپلود عکس */

            let uploaded = false;

            let photoName = '';

            if(navigator.onLine){

                const upload =
                await supabaseClient.storage
                .from('photo')
                .upload(
                    fileName,
                    compressed,
                    {
                        upsert:true,
                        contentType:'image/jpeg'
                    }
                );

                if(!upload.error){

                    uploaded = true;

                    photoName = fileName;
                }
            }

            /* داده */

            const attendanceData = {

                personnel_code:
                personnelCode,

                fullname:
                fullname,

                entry_time:
                new Date()
                .toLocaleString(
                    'fa-IR'
                ),

                latitude:
                location.lat,

                longitude:
                location.lng,

                photo_name:
                photoName
            };

            /* آنلاین */

            if(navigator.onLine){

                const insert =
                await supabaseClient
                .from('eagle')
                .insert([
                    attendanceData
                ]);

                if(insert.error){

                    throw insert.error;
                }

                alert(
                    'تردد ثبت شد'
                );

            }else{

                /* آفلاین */

                let offlineData =

                JSON.parse(

                    localStorage.getItem(
                        'offline_attendance'
                    ) || '[]'
                );

                offlineData.push(
                    attendanceData
                );

                localStorage.setItem(
                    'offline_attendance',
                    JSON.stringify(
                        offlineData
                    )
                );

                alert(
                    'آفلاین ذخیره شد'
                );
            }

            loadRecords();

        }catch(err){

            console.log(err);

            alert(
                'خطا: ' +
                err.message
            );

        }finally{

            document.getElementById(
                'loading'
            ).style.display =
            'none';
        }
    };

    input.click();
};

/* ارسال آفلاین */

async function sendOfflineData(){

    if(!navigator.onLine){

        return;
    }

    let offlineData =

    JSON.parse(

        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineData.length === 0
    ){

        return;
    }

    for(
        let item of offlineData
    ){

        try{

            await supabaseClient
            .from('eagle')
            .insert([item]);

        }catch(err){

            console.log(err);
        }
    }

    localStorage.removeItem(
        'offline_attendance'
    );
}

/* سوابق */

async function loadRecords(){

    const personnelCode =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnelCode){
        return;
    }

    if(!navigator.onLine){
        return;
    }

    try{

        const { data } =
        await supabaseClient
        .from('eagle')
        .select('*')
        .eq(
            'personnel_code',
            personnelCode
        )
        .order(
            'id',
            {
                ascending:false
            }
        );

        if(!data){
            return;
        }

        let html = '';

        data.slice(0,5).forEach(item => {

            html += `
            <div class="record">

            <p>
            زمان:
            ${item.entry_time}
            </p>

            <p>
            GPS:
            ${item.latitude || '-'}
            ,
            ${item.longitude || '-'}
            </p>

            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}

</script>

</body>

</html>
