<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:disabled{
    opacity:0.7;
}

.status{
    text-align:center;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    font-weight:bold;
}

.online{
    background:green;
}

.offline{
    background:red;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

.small{
    font-size:13px;
    color:#666;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد
</h2>

<div
id="networkStatus"
class="status online"
>
🟢 آنلاین
</div>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
autocomplete="off"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
autocomplete="off"
>

<input
type="file"
id="attendancePhoto"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="attendanceBtn"
type="button"
>
📷 ثبت تردد
</button>

<div class="small">
در حالت آفلاین اطلاعات ذخیره و بعداً ارسال می‌شود
</div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* وضعیت اینترنت */

function updateNetworkStatus(){

    const status =
    document.getElementById(
        'networkStatus'
    );

    if(navigator.onLine){

        status.innerHTML =
        '🟢 آنلاین';

        status.className =
        'status online';

        syncOfflineAttendance();

    }else{

        status.innerHTML =
        '🔴 آفلاین';

        status.className =
        'status offline';
    }
}

window.addEventListener(
    'online',
    updateNetworkStatus
);

window.addEventListener(
    'offline',
    updateNetworkStatus
);

/* قفل */

function lockFields(){

    const fullname =
    document.getElementById(
        'fullname'
    );

    const code =
    document.getElementById(
        'personnel_code'
    );

    fullname.readOnly = true;
    code.readOnly = true;

    fullname.style.background =
    '#eee';

    code.style.background =
    '#eee';
}

/* IndexedDB */

let db;

function initDB(){

    return new Promise((resolve,reject)=>{

        const request =
        indexedDB.open(
            'AttendanceDB',
            1
        );

        request.onupgradeneeded =
        function(e){

            db =
            e.target.result;

            if(
                !db.objectStoreNames.contains(
                    'offlineAttendance'
                )
            ){

                db.createObjectStore(
                    'offlineAttendance',
                    {
                        keyPath:'id',
                        autoIncrement:true
                    }
                );
            }
        };

        request.onsuccess =
        function(e){

            db = e.target.result;
            resolve();
        };

        request.onerror =
        function(){

            reject();
        };
    });
}

async function saveOffline(data){

    return new Promise((resolve)=>{

        const tx =
        db.transaction(
            ['offlineAttendance'],
            'readwrite'
        );

        const store =
        tx.objectStore(
            'offlineAttendance'
        );

        store.add(data);

        tx.oncomplete =
        function(){

            resolve();
        };
    });
}

async function getOfflineData(){

    return new Promise((resolve)=>{

        const tx =
        db.transaction(
            ['offlineAttendance'],
            'readonly'
        );

        const store =
        tx.objectStore(
            'offlineAttendance'
        );

        const request =
        store.getAll();

        request.onsuccess =
        function(){

            resolve(
                request.result
            );
        };
    });
}

async function clearOffline(id){

    return new Promise((resolve)=>{

        const tx =
        db.transaction(
            ['offlineAttendance'],
            'readwrite'
        );

        const store =
        tx.objectStore(
            'offlineAttendance'
        );

        store.delete(id);

        tx.oncomplete =
        function(){

            resolve();
        };
    });
}

/* شروع */

window.onload = async function(){

    await initDB();

    updateNetworkStatus();

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    if(savedName && savedCode){

        lockFields();
    }

    loadRecords();
};

/* فشرده سازی */

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload =
        function(event){

            const img =
            new Image();

            img.src =
            event.target.result;

            img.onload =
            function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 450;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(

                    function(blob){

                        resolve(blob);

                    },

                    'image/jpeg',
                    0.6
                );
            };
        };
    });
}

/* GPS */

function getLocation(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve({
                lat:null,
                lng:null
            });

            return;
        }

        let finished = false;

        const timeout =
        setTimeout(function(){

            if(!finished){

                finished = true;

                resolve({
                    lat:null,
                    lng:null
                });
            }

        },7000);

        navigator.geolocation
        .getCurrentPosition(

            position => {

                if(finished){
                    return;
                }

                finished = true;

                clearTimeout(timeout);

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude
                });

            },

            () => {

                if(finished){
                    return;
                }

                finished = true;

                clearTimeout(timeout);

                resolve({
                    lat:null,
                    lng:null
                });

            },

            {
                enableHighAccuracy:true,
                maximumAge:0
            }
        );
    });
}

/* ثبت تردد */

document.getElementById(
    'attendanceBtn'
).onclick = async function(){

    const btn =
    document.getElementById(
        'attendanceBtn'
    );

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'نام و کد پرسنلی را وارد کنید'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockFields();

    btn.disabled = true;

    try{

        /* ذخیره پرسنل */

        if(navigator.onLine){

            await supabaseClient
            .from('personnel')
            .upsert([{

                personnel_code:
                personnelCode,

                fullname:
                fullname

            }]);
        }

        /* سریع باز شدن دوربین */

        const input =
        document.getElementById(
            'attendancePhoto'
        );

        input.value = '';

        input.setAttribute(
            'capture',
            'user'
        );

        input.onchange =
        async function(e){

            btn.disabled = false;

            const file =
            e.target.files[0];

            if(!file){
                return;
            }

            try{

                const location =
                await getLocation();

                const compressed =
                await compressImage(
                    file
                );

                const reader =
                new FileReader();

                reader.readAsDataURL(
                    compressed
                );

                reader.onloadend =
                async function(){

                    const base64 =
                    reader.result;

                    const fileName =
                    'attendance_' +
                    personnelCode +
                    '_' +
                    Date.now() +
                    '.jpg';

                    const attendanceData = {

                        personnel_code:
                        personnelCode,

                        fullname:
                        fullname,

                        entry_time:
                        new Date()
                        .toLocaleString(
                            'fa-IR'
                        ),

                        latitude:
                        location.lat,

                        longitude:
                        location.lng,

                        photo_name:
                        fileName,

                        photo_base64:
                        base64
                    };

                    /* آفلاین */

                    if(!navigator.onLine){

                        await saveOffline(
                            attendanceData
                        );

                        alert(
                            'تردد آفلاین ذخیره شد'
                        );

                        return;
                    }

                    await uploadAttendance(
                        attendanceData
                    );
                };

            }catch(err){

                alert(
                    err.message
                );
            }
        };

        input.click();

    }catch(err){

        btn.disabled = false;

        alert(
            err.message
        );
    }
};

/* آپلود */

async function uploadAttendance(data){

    try{

        const response =
        await fetch(
            data.photo_base64
        );

        const blob =
        await response.blob();

        const uploadResult =
        await supabaseClient.storage
        .from('reference-photos')
        .upload(

            'attendance/' +
            data.photo_name,

            blob,

            {
                upsert:true,
                contentType:'image/jpeg'
            }
        );

        if(uploadResult.error){

            throw uploadResult.error;
        }

        const insertResult =
        await supabaseClient
        .from('eagle')
        .insert([{

            personnel_code:
            data.personnel_code,

            fullname:
            data.fullname,

            entry_time:
            data.entry_time,

            latitude:
            data.latitude,

            longitude:
            data.longitude,

            photo_name:
            data.photo_name

        }]);

        if(insertResult.error){

            throw insertResult.error;
        }

        alert(
            'تردد ثبت شد'
        );

        loadRecords();

    }catch(err){

        alert(
            'خطا:\n' +
            err.message
        );
    }
}

/* سینک آفلاین */

async function syncOfflineAttendance(){

    if(!navigator.onLine){
        return;
    }

    const offlineData =
    await getOfflineData();

    for(const item of offlineData){

        try{

            await uploadAttendance(
                item
            );

            await clearOffline(
                item.id
            );

        }catch(err){

            console.log(err);
        }
    }
}

/* سوابق */

async function loadRecords(){

    const personnelCode =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnelCode){
        return;
    }

    if(!navigator.onLine){
        return;
    }

    try{

        const { data } =
        await supabaseClient
        .from('eagle')
        .select('*')
        .eq(
            'personnel_code',
            personnelCode
        )
        .order(
            'id',
            {
                ascending:false
            }
        );

        if(!data){
            return;
        }

        let html = '';

        data.slice(0,5).forEach(item => {

            html += `
            <div class="record">

                <p>
                زمان:
                ${item.entry_time}
                </p>

                <p>
                GPS:
                ${item.latitude || '-'}
                ,
                ${item.longitude || '-'}
                </p>

            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}

</script>

</body>

</html>
