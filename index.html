
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:green;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}

#photoCounter{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#1a2a6c;
    font-weight:bold;
}

</style>

<script defer src="./face-api/face-api.min.js"></script>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="photo"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="captureBtn"
type="button"
onclick="captureReferencePhoto()"
style="background:#00897b;"
>
📸 گرفتن 5 عکس مرجع
</button>

<div id="photoCounter">
5 عکس باقی مانده
</div>

<button
type="button"
id="photoBtn"
onclick="openCamera()"
>
📷 گرفتن عکس
</button>

<button
onclick="saveAttendance()"
>
ثبت ورود
</button>

<div id="status"></div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let remainingPhotos = 5;

let faceModelsLoaded = false;

async function loadFaceModels(){

    if(faceModelsLoaded) return;

    await faceapi.nets.tinyFaceDetector.loadFromUri('./face-api/models');

    await faceapi.nets.faceLandmark68Net.loadFromUri('./face-api/models');

    await faceapi.nets.faceRecognitionNet.loadFromUri('./face-api/models');

    faceModelsLoaded = true;

    console.log('Face Models Loaded');
}

window.onload = async function(){

    await loadFaceModels();

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

   if(savedName){

    document.getElementById(
        'fullname'
    ).value = savedName;

    document.getElementById(
        'fullname'
    ).disabled = true;

    document.getElementById(
        'fullname'
    ).style.background = '#eee';
}

    if(savedCode){

    document.getElementById(
        'personnel_code'
    ).value = savedCode;

    if(remainingPhotos <= 0){

        document.getElementById(
            'personnel_code'
        ).readOnly = true;

        document.getElementById(
            'personnel_code'
        ).style.background = '#eee';
    }
        const { data } =

        await supabaseClient

        .from('personnel')

        .select('*')

        .eq(
            'personnel_code',
            savedCode
        )

        .single();

        if(data){

            remainingPhotos =
            Math.max(
                0,
                5 - (data.photo_count || 0)
            );

            updatePhotoCounter();
        }
    }

    await sendOfflineData();

    loadMyRecords();
}

function updatePhotoCounter(){

    if(remainingPhotos > 0){

        document.getElementById(
            'photoCounter'
        ).innerHTML =

        remainingPhotos +
        ' عکس باقی مانده';

        document.getElementById(
            'captureBtn'
        ).innerHTML =

        '📸 گرفتن ' +
        remainingPhotos +
        ' عکس مرجع';

    }else{

        document.getElementById(
            'photoCounter'
        ).innerHTML =

        'عکس‌های مرجع تکمیل شد';

        document.getElementById(
            'captureBtn'
        ).disabled = true;

        document.getElementById(
            'captureBtn'
        ).style.background = 'gray';

        document.getElementById(
            'captureBtn'
        ).innerHTML =

        '✅ تکمیل شد';
    }
}

function openCamera(){

    document.getElementById(
        'photo'
    ).click();
}

async function captureReferencePhoto(){

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value;

    if(!personnelCode){

        alert('ابتدا کد پرسنلی را وارد کنید');

        return;
    }

    if(remainingPhotos <= 0){

        alert('۵ عکس قبلا ثبت شده');

        return;
    }

    const photoInput =
    document.getElementById('photo');

    photoInput.click();

    photoInput.onchange = async function(){

        const file = this.files[0];

        if(!file) return;

       const fileName =

personnelCode +

'_' +

Date.now() +

'_' +

Math.floor(
    Math.random() * 999999
) +

'.jpg';

        const { error } =

        await supabaseClient.storage

        .from('reference-photos')

        .upload(
    fileName,
    file,
    {
        cacheControl:'3600',
        upsert:false
    }
);

        if(error){

            console.log(error);

            alert('خطا در آپلود عکس');

            return;
        }

        remainingPhotos = Math.max(
            0,
            remainingPhotos - 1
        );

        await supabaseClient
        .from('personnel')
        .upsert({

            personnel_code:
            personnelCode,

            photo_count:
            5 - remainingPhotos,

            photo_locked:
            (5 - remainingPhotos) >= 5
        });

        updatePhotoCounter();

        photoInput.value = '';
    };
}

async function saveAttendance(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value;

    const personnel_code =
    document.getElementById(
        'personnel_code'
    ).value;

    const photoFile =
    document.getElementById(
        'photo'
    ).files[0];

    if(
        fullname === '' ||
        personnel_code === ''
    ){

        alert(
            'اطلاعات را کامل وارد کنید'
        );

        return;
    }

    if(!photoFile){

        alert('عکس بگیرید');

        return;
    }

    const img =
    await faceapi.bufferToImage(
        photoFile
    );

    const detection =

    await faceapi

    .detectSingleFace(
        img,
        new faceapi.TinyFaceDetectorOptions()
    )

    .withFaceLandmarks()

    .withFaceDescriptor();

    if(!detection){

        alert('چهره تشخیص داده نشد');

        return;
    }

    const currentDescriptor =
    detection.descriptor;

    const { data: allPhotos } =

    await supabaseClient.storage

    .from('reference-photos')

    .list();

    const referencePhotos =

    allPhotos.filter(photo =>

        photo.name.startsWith(
            personnel_code + '_'
        )
    );

    if(
        !referencePhotos ||
        referencePhotos.length === 0
    ){

        alert(
            'ابتدا ۵ عکس مرجع ثبت کنید'
        );

        return;
    }

    let matched = false;

    for(const photo of referencePhotos){

        try{

            const photoUrl =

            SUPABASE_URL +

            '/storage/v1/object/public/reference-photos/' +

            photo.name;

            const refImg =

            await faceapi.fetchImage(
                photoUrl
            );

            const refDetection =

            await faceapi

            .detectSingleFace(
                refImg,
                new faceapi.TinyFaceDetectorOptions()
            )

            .withFaceLandmarks()

            .withFaceDescriptor();

            if(!refDetection){

                continue;
            }

            const distance =

            faceapi.euclideanDistance(

                currentDescriptor,

                refDetection.descriptor
            );

            if(distance < 0.45){

                matched = true;

                break;
            }

        }catch(err){

            console.log(err);
        }
    }

    if(!matched){

        alert(
            'چهره مطابقت ندارد'
        );

        return;
    }
   console.log('Face Matched');
    navigator.geolocation.getCurrentPosition(

async position => {

    async position => {

        const latitude =
        position.coords.latitude;

        const longitude =
        position.coords.longitude;

        const now =
        new Date().toLocaleString(
            'fa-IR'
        );

        let photo_url = '';

        const fileName =
        Date.now() + '.jpg';

        const { error: uploadError } =

        await supabaseClient.storage

        .from('photo')

        .upload(

            fileName,

            photoFile,

            {
                upsert:true
            }
        );

        if(!uploadError){

            const { data } =

            supabaseClient.storage

            .from('photo')

            .getPublicUrl(
                fileName
            );

            photo_url =
            data.publicUrl;
        }

        const { error } =

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                fullname,

                personnel_code:
                personnel_code,

                entry_time:
                now,

                latitude:
                latitude.toString(),

                longitude:
                longitude.toString(),

                photo_url:
                photo_url
            }
        ]);

        if(error){

            console.log(error);

            document.getElementById(
                'status'
            ).innerHTML =

            'خطا در ثبت اطلاعات';

        }else{

            document.getElementById(
                'status'
            ).innerHTML =

            'اطلاعات با موفقیت ثبت شد';

            document.getElementById(
                'photo'
            ).value = '';

            loadMyRecords();
        }

    });
}

async function sendOfflineData(){

    if(!navigator.onLine){

        return;
    }

    let offlineData =

    JSON.parse(

        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineData.length === 0
    ){

        return;
    }

    for(
        let item of offlineData
    ){

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                item.fullname,

                personnel_code:
                item.personnel_code,

                entry_time:
                item.entry_time,

                latitude:
                item.latitude.toString(),

                longitude:
                item.longitude.toString(),

                photo_url:''
            }
        ]);
    }

    localStorage.removeItem(
        'offline_attendance'
    );
}

async function loadMyRecords(){

    const personnel_code =

    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){

        return;
    }

    const { data } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .eq(
        'personnel_code',
        personnel_code
    )

    .order(
        'id',
        {
            ascending:false
        }
    );

    let html = `

    <h3 style="
    margin-top:30px;
    text-align:center;
    color:#1a2a6c;
    ">
    ۳ روز اخیر
    </h3>
    `;

    const grouped = {};

    data.forEach(item => {

        const onlyDate =
        item.entry_time.substring(0,10);

        if(!grouped[onlyDate]){

            grouped[onlyDate] = [];
        }

        grouped[onlyDate].push(item);
    });

    const dates =
    Object.keys(grouped).slice(0,3);

    dates.forEach(date => {

        const records =
        grouped[date];

        const first =
        records[
            records.length - 1
        ];

        const last =
        records[0];

        html += `

        <div class="record">

        <h4>
        ${date}
        </h4>

        <p>
        اولین تردد:
        ${first.entry_time}
        </p>

        <p>
        آخرین تردد:
        ${last.entry_time}
        </p>

        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register(
        './sw.js'
    );
}

</script>

</body>

</html>
