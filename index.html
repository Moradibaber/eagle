<meta

content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.locked{
    background:#e9ecef !important;
    pointer-events:none;
}

#status{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
    color:#1a2a6c;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="attendancePhoto"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="saveInfoBtn"
onclick="savePersonnelInfo()"
style="background:#00897b;"
>
ثبت اطلاعات پرسنلی
</button>

<button
id="attendanceBtn"
onclick="saveAttendance()"
>
📷 ثبت تردد
</button>

<div id="status"></div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/*
ذخیره دائمی
حتی با رفرش
*/

function savePermanentData(key,value){

    localStorage.setItem(key,value);

    document.cookie =
    key + "=" + value +
    ";path=/;max-age=315360000";
}

function getPermanentData(key){

    let value =
    localStorage.getItem(key);

    if(value){
        return value;
    }

    const cookies =
    document.cookie.split(";");

    for(let c of cookies){

        let item = c.trim();

        if(
            item.startsWith(
                key + "="
            )
        ){

            return item.substring(
                key.length + 1
            );
        }
    }

    return null;
}

function lockFields(){

    document.getElementById(
        'fullname'
    ).classList.add(
        'locked'
    );

    document.getElementById(
        'personnel_code'
    ).classList.add(
        'locked'
    );

    document.getElementById(
        'fullname'
    ).readOnly = true;

    document.getElementById(
        'personnel_code'
    ).readOnly = true;

    document.getElementById(
        'saveInfoBtn'
    ).style.display = 'none';
}

window.onload = async function(){

    const fullname =
    getPermanentData(
        'employee_fullname'
    );

    const code =
    getPermanentData(
        'employee_code'
    );

    if(fullname){

        document.getElementById(
            'fullname'
        ).value = fullname;
    }

    if(code){

        document.getElementById(
            'personnel_code'
        ).value = code;
    }

    if(fullname && code){

        lockFields();

        loadMyRecords();
    }

    syncOfflineRecords();
};

async function savePersonnelInfo(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'اطلاعات را کامل وارد کنید'
        );

        return;
    }

    /*
    جلوگیری از تغییر
    */

    const oldCode =
    getPermanentData(
        'employee_code'
    );

    if(oldCode){

        alert(
            'اطلاعات قبلا ثبت شده و قابل تغییر نیست'
        );

        return;
    }

    try{

        const {
            data: existing
        } =
        await supabaseClient
        .from('personnel')
        .select('*')
        .eq(
            'personnel_code',
            personnelCode
        )
        .maybeSingle();

        if(existing){

            savePermanentData(
                'employee_fullname',
                existing.fullname
            );

            savePermanentData(
                'employee_code',
                existing.personnel_code
            );

        }else{

            const result =
            await supabaseClient
            .from('personnel')
            .insert([{

                fullname:
                fullname,

                personnel_code:
                personnelCode

            }]);

            if(result.error){

                alert(
                    result.error.message
                );

                return;
            }

            savePermanentData(
                'employee_fullname',
                fullname
            );

            savePermanentData(
                'employee_code',
                personnelCode
            );
        }

        lockFields();

        alert(
            'اطلاعات پرسنلی ثبت شد'
        );

    }catch(err){

        alert(err.message);
    }
}

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(event){

            const img =
            new Image();

            img.src =
            event.target.result;

            img.onload = function(){

                const canvas =
                document.createElement(
                    'canvas'
                );

                const maxWidth = 400;

                let width =
                img.width;

                let height =
                img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width =
                    maxWidth;
                }

                canvas.width =
                width;

                canvas.height =
                height;

                const ctx =
                canvas.getContext(
                    '2d'
                );

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(
                    function(blob){

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.5
                );
            };
        };
    });
}

function getGPS(){

    return new Promise((resolve)=>{

        if(!navigator.geolocation){

            resolve(null);

            return;
        }

        navigator.geolocation.getCurrentPosition(

            position => {

                resolve({

                    lat:
                    position.coords.latitude,

                    lng:
                    position.coords.longitude

                });

            },

            () => {

                resolve(null);

            },

            {
                enableHighAccuracy:true,
                timeout:10000
            }
        );
    });
}

async function saveAttendance(){

    const personnelCode =
    getPermanentData(
        'employee_code'
    );

    if(!personnelCode){

        alert(
            'ابتدا اطلاعات پرسنلی ثبت شود'
        );

        return;
    }

    const attendanceInput =
    document.getElementById(
        'attendancePhoto'
    );

    attendanceInput.value = '';

    attendanceInput.onchange = null;

    attendanceInput.onchange =
    async function(e){

        const btn =
        document.getElementById(
            'attendanceBtn'
        );

        try{

            btn.disabled = true;

            const file =
            e.target.files[0];

            if(!file){

                btn.disabled = false;
                return;
            }

            const gps =
            await getGPS();

            const compressedFile =
            await compressImage(file);

            /*
            حالت آفلاین
            */

            if(!navigator.onLine){

                let offlineData =
                JSON.parse(
                    localStorage.getItem(
                        'offline_attendance'
                    ) || '[]'
                );

                offlineData.push({

                    personnel_code:
                    personnelCode,

                    entry_time:
                    new Date()
                    .toLocaleString(
                        'fa-IR'
                    ),

                    lat:
                    gps ? gps.lat : null,

                    lng:
                    gps ? gps.lng : null

                });

                localStorage.setItem(
                    'offline_attendance',
                    JSON.stringify(
                        offlineData
                    )
                );

                document.getElementById(
                    'status'
                ).innerHTML =
                '✅ آفلاین ذخیره شد';

                alert(
                    'تردد در حالت آفلاین ذخیره شد'
                );

                btn.disabled = false;

                return;
            }

            const fileName =
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            const uploadResult =
            await supabaseClient.storage
            .from('attendance')
            .upload(
                fileName,
                compressedFile,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                alert(
                    uploadResult.error.message
                );

                btn.disabled = false;

                return;
            }

            const insertResult =
            await supabaseClient
            .from('eagle')
            .insert([{

                personnel_code:
                personnelCode,

                entry_time:
                new Date()
                .toLocaleString(
                    'fa-IR'
                ),

                photo_name:
                fileName,

                lat:
                gps ? gps.lat : null,

                lng:
                gps ? gps.lng : null

            }]);

            if(insertResult.error){

                alert(
                    insertResult.error.message
                );

                btn.disabled = false;

                return;
            }

            document.getElementById(
                'status'
            ).innerHTML =
            '✅ تردد ثبت شد';

            loadMyRecords();

        }catch(err){

            alert(err.message);

        }finally{

            btn.disabled = false;
        }
    };

    attendanceInput.click();
}

async function syncOfflineRecords(){

    if(!navigator.onLine){

        return;
    }

    let offlineData =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(offlineData.length === 0){

        return;
    }

    for(let item of offlineData){

        await supabaseClient
        .from('eagle')
        .insert([item]);
    }

    localStorage.removeItem(
        'offline_attendance'
    );

    document.getElementById(
        'status'
    ).innerHTML =
    '✅ اطلاعات آفلاین ارسال شد';
}

async function loadMyRecords(){

    const personnelCode =
    getPermanentData(
        'employee_code'
    );

    if(!personnelCode){

        return;
    }

    const { data } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .eq(
        'personnel_code',
        personnelCode
    )
    .order(
        'id',
        {
            ascending:false
        }
    );

    if(!data){

        return;
    }

    let html = '';

    data.slice(0,5).forEach(item => {

        html += `
        <div class="record">

            <p>
            زمان:
            ${item.entry_time}
            </p>

            <p>
            GPS:
            ${item.lat || '-'}
            ,
            ${item.lng || '-'}
            </p>

        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

</script>
