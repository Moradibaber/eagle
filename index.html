<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:green;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}

#photoCounter{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#1a2a6c;
    font-weight:bold;
}

.disabled{
    background:#ccc !important;
    cursor:not-allowed;
}

</style>

<script defer src="./face-api/face-api.min.js"></script>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="photo"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="captureBtn"
type="button"
onclick="captureReferencePhoto()"
style="background:#00897b;"
>
📸 گرفتن 3 عکس مرجع
</button>

<div id="photoCounter">
3 عکس باقی مانده
</div>

<button
type="button"
id="photoBtn"
onclick="saveAttendance()"
>
📷 ثبت ورود
</button>

<div id="status"></div>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let remainingPhotos = 3;

let faceModelsLoaded = false;

async function loadFaceModels(){

    if(faceModelsLoaded) return;

    await faceapi.nets.tinyFaceDetector.loadFromUri('./face-api/models');

    await faceapi.nets.faceLandmark68Net.loadFromUri('./face-api/models');

    await faceapi.nets.faceRecognitionNet.loadFromUri('./face-api/models');

    faceModelsLoaded = true;
}

function lockPersonnelFields(){

    const fullnameInput =
    document.getElementById('fullname');

    const codeInput =
    document.getElementById('personnel_code');

    fullnameInput.readOnly = true;
    codeInput.readOnly = true;

    fullnameInput.style.background = '#eee';
    codeInput.style.background = '#eee';
}

window.onload = async function(){

    await loadFaceModels();

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    if(savedName && savedCode){

        lockPersonnelFields();

        const { data } =

        await supabaseClient

        .from('personnel')

        .select('*')

        .eq(
            'personnel_code',
            savedCode
        )

        .maybeSingle();

        if(data){

            remainingPhotos =
            Math.max(
                0,
                3 - (data.photo_count || 0)
            );

            updatePhotoCounter();
        }
    }

    loadMyRecords();
};

function updatePhotoCounter(){

    if(remainingPhotos > 0){

        document.getElementById(
            'photoCounter'
        ).innerHTML =

        remainingPhotos +
        ' عکس باقی مانده';

        document.getElementById(
            'captureBtn'
        ).innerHTML =

        '📸 گرفتن ' +
        remainingPhotos +
        ' عکس مرجع';

    }else{

        document.getElementById(
            'photoCounter'
        ).innerHTML =

        '✅ عکس‌های مرجع تکمیل شد';

        document.getElementById(
            'captureBtn'
        ).disabled = true;

        document.getElementById(
            'captureBtn'
        ).classList.add(
            'disabled'
        );
    }
}

async function captureReferencePhoto(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'ابتدا نام و کد پرسنلی را وارد کنید'
        );

        return;
    }

    const savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    const savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(savedName && savedName !== fullname){

        alert(
            'نام قابل تغییر نیست'
        );

        return;
    }

    if(savedCode && savedCode !== personnelCode){

        alert(
            'کد پرسنلی قابل تغییر نیست'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockPersonnelFields();

    if(remainingPhotos <= 0){

        alert(
            '۳ عکس مرجع ثبت شده'
        );

        return;
    }

    const photoInput =
    document.getElementById(
        'photo'
    );

    photoInput.value = '';

    photoInput.onchange = null;

    photoInput.onchange = async function(e){

        try{

            const file =
            e.target.files[0];

            if(!file){

                return;
            }

            if(file.size > 10 * 1024 * 1024){

                alert(
                    'حجم عکس زیاد است'
                );

                return;
            }

            document.getElementById(
                'captureBtn'
            ).disabled = true;

            const fileName =

            personnelCode +

            '_' +

            Date.now() +

            '.jpg';

            const { error } =

            await supabaseClient.storage

            .from('reference-photos')

            .upload(
                fileName,
                file,
                {
                    cacheControl:'3600',
                    upsert:false
                }
            );

            document.getElementById(
                'captureBtn'
            ).disabled = false;

            if(error){
               alert(
                   'حطا در آپلود'+
                   error.message
               );
                console.log(error);
                            
                );

                return;
            }

            remainingPhotos--;

            const { data: existingPerson } =

            await supabaseClient

            .from('personnel')

            .select('*')

            .eq(
                'personnel_code',
                personnelCode
            )

            .maybeSingle();

            let saveError = null;

            if(existingPerson){

                const { error } =

                await supabaseClient

                .from('personnel')

                .update({

                    fullname:
                    fullname,

                    photo_count:
                    3 - remainingPhotos

                })

                .eq(
                    'personnel_code',
                    personnelCode
                );

                saveError = error;

            }else{

                const { error } =

                await supabaseClient

                .from('personnel')

                .insert([{

                    personnel_code:
                    personnelCode,

                    fullname:
                    fullname,

                    photo_count:
                    3 - remainingPhotos

                }]);

                saveError = error;
            }

            if(saveError){

                console.log(saveError);

                alert(
                    'خطا در ذخیره اطلاعات'
                );

                return;
            }

            updatePhotoCounter();

            photoInput.value = '';

            if(remainingPhotos <= 0){

                alert(
                    'ثبت ۳ عکس کامل شد'
                );

            }else{

                alert(
                    'عکس ذخیره شد - ' +
                    remainingPhotos +
                    ' عکس باقی مانده'
                );
            }

        }catch(err){

            console.log(err);

            alert(
                'خطا: ' + err.message
            );
        }
    };

    photoInput.click();
}

async function saveAttendance(){

    const fullname =
    localStorage.getItem(
        'employee_fullname'
    );

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!fullname || !personnel_code){

        alert(
            'ابتدا اطلاعات پرسنلی را ثبت کنید'
        );

        return;
    }

    if(remainingPhotos > 0){

        alert(
            'ابتدا ۳ عکس مرجع را کامل ثبت کنید'
        );

        return;
    }

    alert('سیستم ثبت ورود آماده است');

}

async function loadMyRecords(){

    const personnel_code =

    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){

        return;
    }

    const { data } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .eq(
        'personnel_code',
        personnel_code
    )

    .order(
        'id',
        {
            ascending:false
        }
    );

    if(!data) return;

    let html = `

    <h3 style="
    margin-top:30px;
    text-align:center;
    color:#1a2a6c;
    ">
    ۳ روز اخیر
    </h3>
    `;

    const grouped = {};

    data.forEach(item => {

        const onlyDate =
        item.entry_time.substring(0,10);

        if(!grouped[onlyDate]){

            grouped[onlyDate] = [];
        }

        grouped[onlyDate].push(item);
    });

    const dates =
    Object.keys(grouped).slice(0,3);

    dates.forEach(date => {

        const records =
        grouped[date];

        const first =
        records[
            records.length - 1
        ];

        const last =
        records[0];

        html += `

        <div class="record">

        <h4>
        ${date}
        </h4>

        <p>
        اولین تردد:
        ${first.entry_time}
        </p>

        <p>
        آخرین تردد:
        ${last.entry_time}
        </p>

        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register(
        './sw.js'
    );
}

</script>

</body>

</html>
