   function openOfflineDB(){

    return new Promise((resolve, reject) => {

        const request =
        indexedDB.open(
            'attendance_offline_db',
            1
        );

        request.onupgradeneeded =
        function(event){

            const db =
            event.target.result;

            if(
                !db.objectStoreNames.contains(
                    'attendance_photos'
                )
            ){
                db.createObjectStore(
                    'attendance_photos',
                    {
                        keyPath:'fileName'
                    }
                );
            }
        };

        request.onsuccess =
        function(event){
            resolve(
                event.target.result
            );
        };

        request.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function saveAttendancePhotoOffline(fileName, blob){

    const db =
    await openOfflineDB();

    return new Promise((resolve, reject) => {

        const tx =
        db.transaction(
            'attendance_photos',
            'readwrite'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        store.put({
            fileName:fileName,
            blob:blob
        });

        tx.oncomplete =
        function(){
            resolve();
        };

        tx.onerror =
        function(event){
            reject(
                event.target.error
            );
        };
    });
}

async function getAttendancePhotoOffline(fileName){

        db.transaction(
            'attendance_photos',
            'readonly'
        );

        const store =
        tx.objectStore(
            'attendance_photos'
        );

        const request =

        request.onsuccess =
        function(){

/*
فشرده سازی عکس
*/
async function compressImage(file){

    return new Promise((resolve, reject)=>{

        const reader =
        new FileReader();

        reader.onload = function(event){

            const img =
            new Image();

            img.onload = function(){

                const canvas =
                document.createElement('canvas');

                const finalSize = 320;

                canvas.width = finalSize;
                canvas.height = finalSize;

                const ctx =
                canvas.getContext('2d');

                /*
                برش مربعی از مرکز تصویر
                برای اینکه اگر کاربر صورت را وسط کادر بگیرد،
                خروجی بیشتر روی صورت متمرکز باشد.
                */

                const sourceSize =
                Math.min(
                    img.width,
                    img.height
                );

                const sourceX =
                Math.floor(
                    (img.width - sourceSize) / 2
                );

                const sourceY =
                Math.floor(
                    (img.height - sourceSize) / 2
                );

                ctx.drawImage(
                    img,
                    sourceX,
                    sourceY,
                    sourceSize,
                    sourceSize,
                    0,
                    0,
                    finalSize,
                    finalSize
                );

                canvas.toBlob(
                    function(blob){

                        if(!blob){
                            reject(
                                new Error('خطا در فشرده‌سازی عکس')
                            );
                            return;
                        }

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.45
                );
            };

            img.onerror = function(){
                reject(
                    new Error('خطا در خواندن تصویر')
                );
            };

            img.src =
            event.target.result;
        };

        reader.onerror = function(){
            reject(
                new Error('خطا در خواندن فایل عکس')
            );
        };

        reader.readAsDataURL(file);
    });
}

function getLocation(){
    return new Promise(function(resolve){
        if(!navigator.geolocation){
            resolve({lat:0, lng:0, accuracy:0});
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(position){
                resolve({
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    accuracy: position.coords.accuracy
                });
            },
            function(error){
                console.log('Geolocation error:', error);
                // به جای متوقف کردن برنامه، مختصات صفر برمی‌گردانیم
                resolve({lat:0, lng:0, accuracy:0});
            },
            {
                enableHighAccuracy: false, // در حالت آفلاین بهتر است خاموش باشد تا خطا ندهد
                timeout: 8000,             // حداکثر ۸ ثانیه منتظر موقعیت بماند
                maximumAge: 60000          // استفاده از آخرین موقعیت کش شده تا ۱ دقیقه قبل
            }
        );
    });
}

            );
        }
    };

    hideLoading();

    attendanceInput.click();
}


async function syncOfflineAttendance(){

    if(!navigator.onLine || !supabaseClient){
        return;
    }


    let offlineAttendance =
    JSON.parse(
        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineAttendance.length === 0
    ){
        return;
    }

    let notSynced = [];

    for(
        const item of offlineAttendance
    ){

        try{

            const photoBlob =
            await getAttendancePhotoOffline(
                item.photo_name
            );

            if(!photoBlob){

                console.log(
                    'عکس آفلاین پیدا نشد:',
                    item.photo_name
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const uploadResult =
            await supabaseClient.storage
            .from(
                'reference-photos'
            )
            .upload(
                'attendance/' +
                item.photo_name,
                photoBlob,
                {
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                console.log(
                    uploadResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            const insertResult =
            await supabaseClient
            .from(
                'eagle'
            )
            .insert([
                {
                    personnel_code:
                    item.personnel_code,

                    fullname:
                    item.fullname,

                    entry_time:
                    item.entry_time,

                    latitude:
                    item.latitude,

                    longitude:
                    item.longitude,

                    photo_name:
                    item.photo_name
                }
            ]);

            if(insertResult.error){

                console.log(
                    insertResult.error
                );

                notSynced.push(
                    item
                );

                continue;
            }

            await deleteAttendancePhotoOffline(
                item.photo_name
            );

        }catch(err){

            console.log(
                err
            );

            notSynced.push(
                item
            );
        }
    }

    if(
        notSynced.length > 0
    ){

        localStorage.setItem(
            'offline_attendance',
            JSON.stringify(
                notSynced
            )
        );

    }else{

        localStorage.removeItem(
            'offline_attendance'
        );
    }
    updateOfflineCounter();
}

نمایش سوابق

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){
        return;
    }

    try{

        let allRecords = [];

        /*
        دریافت ترددهای آنلاین از Supabase
        */

       if(navigator.onLine && supabaseClient){

    const { data } =
    await supabaseClient

            .from('eagle')
            .select('*')
            .eq(
                'personnel_code',
                personnel_code
            )
            .order(
                'id',
                {
                    ascending:false
                }
            );

            if(data){
                allRecords =
                allRecords.concat(
                    data
                );
            }
        }

        /*
        اضافه کردن ترددهای آفلاین ذخیره‌شده در موبایل
        */

        const offlineAttendance =
        JSON.parse(
            localStorage.getItem(
                'offline_attendance'
            ) || '[]'
        );

        const myOfflineRecords =
        offlineAttendance.filter(
            item =>
            item.personnel_code === personnel_code
        );

        allRecords =
        allRecords.concat(
            myOfflineRecords
        );

        if(allRecords.length === 0){

            document.getElementById(
                'myRecords'
            ).innerHTML =
            '<div class="record">هنوز ترددی ثبت نشده است.</div>';

            return;
        }

        /*
        گروه‌بندی بر اساس روز
        */

        const groupedDays = {};

        allRecords.forEach(item => {

            if(!item.entry_time){
                return;
            }

            const day =
            item.entry_time.split('،')[0];

            if(!groupedDays[day]){
                groupedDays[day] = [];
            }

            groupedDays[day].push(item);
        });

        /*
        مرتب‌سازی روزها بر اساس آخرین تردد همان روز
        */

        const sortedDays =
        Object.keys(groupedDays)
        .sort((a,b) => {

            const lastA =
            groupedDays[a][0];

            const lastB =
            groupedDays[b][0];

            const idA =
            lastA.id || 0;

            const idB =
            lastB.id || 0;

            return idB - idA;
        })
        .slice(0,3);

        let html = '';

        sortedDays.forEach(day => {

            const records =
            groupedDays[day];

            /*
            چون اطلاعات آنلاین با id نزولی آمده،
            ولی اطلاعات آفلاین id ندارد،
            اینجا با همان ترتیب موجود کار می‌کنیم.
            */

            records.sort((a,b) => {

                const idA =
                a.id || 0;

                const idB =
                b.id || 0;

                return idA - idB;
            });

            const firstRecord =
            records[0];

            const lastRecord =
            records[
                records.length - 1
            ];

            html += `
            <div class="record">

                <p>
                    📅 تاریخ:
                    ${day}
                </p>

                <hr>

                <p>
                    🟢 اولین ورود:
                    ${firstRecord.entry_time}
                </p>
            `;

            if(records.length > 1){

                html += `
                <p>
                    🔴 آخرین خروج:
                    ${lastRecord.entry_time}
                </p>
                `;

            }else{

                html += `
                <p>
                    🔴 آخرین خروج:
                    هنوز ثبت نشده
                </p>
                `;
            }

            html += `
            </div>
            `;
        });

        document.getElementById(
            'myRecords'
        ).innerHTML = html;

    }catch(err){

        console.log(err);
    }
}
