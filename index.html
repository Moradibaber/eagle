
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:green;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="photo"
accept="image/*"
capture="user"
style="display:none"
>

<button
type="button"
onclick="openCamera()"
>
📷 گرفتن عکس
</button>

<button
onclick="saveAttendance()"
>
ثبت ورود
</button>

<div id="status"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,

);

window.onload = async function(){

    const savedName =
    localStorage.getItem(

   loadMyRecords();

function openCamera(){

    document.getElementById(
        'photo'
    ).click();
}

async function saveAttendance(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value;

    const personnel_code =
    document.getElementById(
        'personnel_code'
    ).value;

    const photoFile =
    document.getElementById(
        'photo'
    ).files[0];
   
localStorage.setItem(
    'employee_fullname',
    fullname
);

localStorage.setItem(
    'employee_code',
    personnel_code
);


    if(
        fullname === '' ||
        personnel_code === ''
    ){

        alert(
            'اطلاعات را کامل وارد کنید'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnel_code
    );

    navigator.geolocation.getCurrentPosition(

    async position => {

        const latitude =
        position.coords.latitude;

        const longitude =
        position.coords.longitude;

        const now =
        new Date().toLocaleString(
            'fa-IR'
        );

        if(!navigator.onLine){

            let offlineData =

            JSON.parse(

                localStorage.getItem(
                    'offline_attendance'
                ) || '[]'
            );

            offlineData.push({

                fullname:
                fullname,

                personnel_code:
                personnel_code,

                entry_time:
                now,

                latitude:
                latitude,

                longitude:
                longitude
            });

            localStorage.setItem(

                'offline_attendance',

                JSON.stringify(
                    offlineData
                )
            );

            document.getElementById(
                'status'
            ).innerHTML =

            'بدون اینترنت ذخیره شد';

            return;
        }

        let photo_url = '';

        if(photoFile){

            const fileName =
            Date.now() + '.jpg';

            const { error:
            uploadError } =

            await supabaseClient.storage

            .from('photo')

            .upload(

                fileName,

                photoFile,

                {
                    upsert:true
                }
            );

            if(!uploadError){

                const { data } =

                supabaseClient.storage

                .from('photo')

                .getPublicUrl(
                    fileName
                );

                photo_url =
                data.publicUrl;
            }
        }

        const { error } =

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                fullname,

                personnel_code:
                personnel_code,

                entry_time:
                now,

                latitude:
                latitude.toString(),

                longitude:
                longitude.toString(),

                photo_url:
                photo_url
            }
        ]);

        if(error){

            console.log(error);

            document.getElementById(
                'status'
            ).innerHTML =

            'خطا در ثبت اطلاعات';

        }else{

            document.getElementById(
                'status'
            ).innerHTML =

            'اطلاعات با موفقیت ثبت شد';

            document.getElementById(
                'photo'
            ).value = '';
        }

    });
}

async function sendOfflineData(){

    if(!navigator.onLine){

        return;
    }

    let offlineData =

    JSON.parse(

        localStorage.getItem(
            'offline_attendance'
        ) || '[]'
    );

    if(
        offlineData.length === 0
    ){

        return;
    }

    for(
        let item of offlineData
    ){

        const { error } =

        await supabaseClient

        .from('eagle')

        .insert([

            {

                fullname:
                item.fullname,

                personnel_code:
                item.personnel_code,

                entry_time:
                item.entry_time,

                latitude:
                item.latitude.toString(),

                longitude:
                item.longitude.toString(),

                photo_url:''
            }
        ]);

        if(error){

            console.log(error);

            return;
        }
    }

    localStorage.removeItem(
        'offline_attendance'
    );

    document.getElementById(
        'status'
    ).innerHTML =

    'اطلاعات آفلاین ارسال شد';
}

async function loadRecords(){

    const { data, error } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .order(
        'id',
        {
            ascending:false
        }
    );

    if(error){

        console.log(error);

        return;
    }

    let html = '';

    data.forEach(item => {

        html += `

        <div class="record">

        <h3>
        ${item.fullname}
        </h3>

        <p>
        کد پرسنلی:
        ${item.personnel_code}
        </p>

        <p>
        زمان:
        ${item.entry_time}
        </p>

        <p>
        موقعیت:
        ${item.latitude}
        ,
        ${item.longitude}
        </p>

        ${
            item.photo_url
            ?
            `
            <img
            src="${item.photo_url}"
            style="
            width:100%;
            border-radius:10px;
            margin-top:10px;
            "
            >
            `
            :
            ''
        }

        </div>
        `;
    });

    document.getElementById(
        'records'
    ).innerHTML = html;
}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register(
        './sw.js'
    );
}

</script>
