  <!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
سیستم ثبت تردد پرسنل
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1a2a6c;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1a2a6c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.record{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

#photoCounter{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#1a2a6c;
    font-weight:bold;
}

.disabled{
    background:#999 !important;
    cursor:not-allowed;
}

</style>

</head>

<body>

<div class="container">

<h2>
سیستم ثبت تردد پرسنل
</h2>

<input
type="text"
id="fullname"
placeholder="نام و نام خانوادگی"
>

<input
type="text"
id="personnel_code"
placeholder="کد پرسنلی"
>

<input
type="file"
id="photo"
accept="image/*"
capture="user"
style="display:none"
>

<input
type="file"
id="attendancePhoto"
accept="image/*"
capture="user"
style="display:none"
>

<button
id="captureBtn"
type="button"
onclick="captureReferencePhoto()"
style="background:#00897b;"
>
📸 گرفتن 3 عکس مرجع
</button>

<div id="photoCounter">
3 عکس باقی مانده
</div>

<button
id="attendanceBtn"
type="button"
onclick="saveAttendance()"
>
📷 گرفتن عکس تردد روزانه
</button>

<div id="myRecords"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let remainingPhotos = 3;

let faceMatcher = null;

async function loadFaceAPI(){

    await faceapi.nets.ssdMobilenetv1.loadFromUri(
        'https://cdn.jsdelivr.net/npm/face-api.js/models'
    );

    await faceapi.nets.faceRecognitionNet.loadFromUri(
        'https://cdn.jsdelivr.net/npm/face-api.js/models'
    );

    await faceapi.nets.faceLandmark68Net.loadFromUri(
        'https://cdn.jsdelivr.net/npm/face-api.js/models'
    );
}

function lockPersonnelFields(){

    const fullname =
    document.getElementById('fullname');

    const code =
    document.getElementById('personnel_code');

    fullname.readOnly = true;
    code.readOnly = true;

    fullname.style.background = '#eee';
    code.style.background = '#eee';
}

function updatePhotoCounter(){

    const counter =
    document.getElementById('photoCounter');

    const btn =
    document.getElementById('captureBtn');

    if(remainingPhotos > 0){

        counter.innerHTML =
        remainingPhotos +
        ' عکس باقی مانده';

        btn.disabled = false;
        btn.classList.remove('disabled');

    }else{

        counter.innerHTML =
        '✅ عکس‌های مرجع کامل شد';

        btn.disabled = true;
        btn.classList.add('disabled');
    }
}

window.onload = async function(){

    await loadFaceAPI();

    let savedName =
    localStorage.getItem(
        'employee_fullname'
    );

    let savedCode =
    localStorage.getItem(
        'employee_code'
    );

    if(!savedName || !savedCode){

        const { data } =
        await supabaseClient
        .from('personnel')
        .select('*')
        .limit(1);

        if(data && data.length > 0){

            savedName =
            data[0].fullname;

            savedCode =
            data[0].personnel_code;

            localStorage.setItem(
                'employee_fullname',
                savedName
            );

            localStorage.setItem(
                'employee_code',
                savedCode
            );
        }
    }

    if(savedName){

        document.getElementById(
            'fullname'
        ).value = savedName;
    }

    if(savedCode){

        document.getElementById(
            'personnel_code'
        ).value = savedCode;
    }

    if(savedName && savedCode){

        lockPersonnelFields();

        const { data } =
        await supabaseClient
        .from('personnel')
        .select('*')
        .eq(
            'personnel_code',
            savedCode
        )
        .maybeSingle();

        if(data){

            remainingPhotos =
            Math.max(
                0,
                3 - (data.photo_count || 0)
            );

            updatePhotoCounter();
        }
    }

    loadMyRecords();
};

async function compressImage(file){

    return new Promise((resolve)=>{

        const reader =
        new FileReader();

        reader.readAsDataURL(file);

        reader.onload = function(event){

            const img = new Image();

            img.src = event.target.result;

            img.onload = function(){

                const canvas =
                document.createElement('canvas');

                const maxWidth = 320;

                let width = img.width;
                let height = img.height;

                if(width > maxWidth){

                    height =
                    height *
                    (maxWidth / width);

                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                canvas.toBlob(
                    function(blob){

                        resolve(blob);

                    },
                    'image/jpeg',
                    0.45
                );
            };
        };
    });
}

async function captureReferencePhoto(){

    const fullname =
    document.getElementById(
        'fullname'
    ).value.trim();

    const personnelCode =
    document.getElementById(
        'personnel_code'
    ).value.trim();

    if(!fullname || !personnelCode){

        alert(
            'ابتدا اطلاعات را وارد کنید'
        );

        return;
    }

    localStorage.setItem(
        'employee_fullname',
        fullname
    );

    localStorage.setItem(
        'employee_code',
        personnelCode
    );

    lockPersonnelFields();

    if(remainingPhotos <= 0){

        alert(
            '۳ عکس کامل ثبت شده'
        );

        return;
    }

    const photoInput =
    document.getElementById(
        'photo'
    );

    photoInput.value = '';

    photoInput.onchange = null;

    photoInput.onchange =
    async function(e){

        const btn =
        document.getElementById(
            'captureBtn'
        );

        try{

            btn.disabled = true;

            const file =
            e.target.files[0];

            if(!file){

                btn.disabled = false;
                return;
            }

            const compressedFile =
            await compressImage(file);

            const fileName =
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            const uploadResult =
            await supabaseClient.storage
            .from('reference-photos')
            .upload(
                fileName,
                compressedFile,
                {
                    cacheControl:'3600',
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                throw uploadResult.error;
            }

            remainingPhotos--;

            const uploadedCount =
            3 - remainingPhotos;

            const {
                data: existingPerson
            } =
            await supabaseClient
            .from('personnel')
            .select('*')
            .eq(
                'personnel_code',
                personnelCode
            )
            .maybeSingle();

            if(existingPerson){

                await supabaseClient
                .from('personnel')
                .update({
                    fullname:
                    fullname,

                    photo_count:
                    uploadedCount
                })
                .eq(
                    'personnel_code',
                    personnelCode
                );

            }else{

                await supabaseClient
                .from('personnel')
                .insert([{
                    personnel_code:
                    personnelCode,

                    fullname:
                    fullname,

                    photo_count:
                    uploadedCount
                }]);
            }

            updatePhotoCounter();

            if(remainingPhotos > 0){

                alert(
                    'عکس ذخیره شد'
                );

            }else{

                alert(
                    'ثبت ۳ عکس کامل شد'
                );
            }

        }catch(err){

            console.log(err);

            alert(
                'خطا در آپلود:\n' +
                err.message
            );

        }finally{

            btn.disabled = false;
            photoInput.value = '';
        }
    };

    photoInput.click();
}

async function verifyFace(attendanceFile){

    const personnelCode =
    localStorage.getItem(
        'employee_code'
    );

    const { data: files } =
    await supabaseClient.storage
    .from('reference-photos')
    .list('',{
        limit:100
    });

    const referenceFiles =
    files.filter(f =>
        f.name.startsWith(
            personnelCode + '_'
        )
    );

    if(referenceFiles.length === 0){

        alert('عکس مرجع پیدا نشد');

        return false;
    }

    const descriptors = [];

    for(const file of referenceFiles){

        const { data } =
        supabaseClient.storage
        .from('reference-photos')
        .getPublicUrl(file.name);

        const img =
        await faceapi.fetchImage(
            data.publicUrl
        );

        const detection =
        await faceapi
        .detectSingleFace(img)
        .withFaceLandmarks()
        .withFaceDescriptor();

        if(detection){

            descriptors.push(
                detection.descriptor
            );
        }
    }

    if(descriptors.length === 0){

        alert(
            'چهره در عکس مرجع تشخیص داده نشد'
        );

        return false;
    }

    const labeledDescriptor =
    new faceapi.LabeledFaceDescriptors(
        personnelCode,
        descriptors
    );

    faceMatcher =
    new faceapi.FaceMatcher(
        [labeledDescriptor],
        0.5
    );

    const attendanceImg =
    await faceapi.bufferToImage(
        attendanceFile
    );

    const attendanceDetection =
    await faceapi
    .detectSingleFace(attendanceImg)
    .withFaceLandmarks()
    .withFaceDescriptor();

    if(!attendanceDetection){

        alert(
            'چهره در عکس تردد پیدا نشد'
        );

        return false;
    }

    const result =
    faceMatcher.findBestMatch(
        attendanceDetection.descriptor
    );

    return result.label !== 'unknown';
}

async function saveAttendance(){

    if(remainingPhotos > 0){

        alert(
            'ابتدا ۳ عکس مرجع را کامل ثبت کنید'
        );

        return;
    }

    const attendanceInput =
    document.getElementById(
        'attendancePhoto'
    );

    attendanceInput.value = '';

    attendanceInput.onchange = null;

    attendanceInput.onchange =
    async function(e){

        const btn =
        document.getElementById(
            'attendanceBtn'
        );

        try{

            btn.disabled = true;

            const file =
            e.target.files[0];

            if(!file){

                btn.disabled = false;
                return;
            }

            const verified =
            await verifyFace(file);

            if(!verified){

                alert(
                    'چهره تطبیق ندارد'
                );

                btn.disabled = false;
                return;
            }

            const compressedFile =
            await compressImage(file);

            const personnelCode =
            localStorage.getItem(
                'employee_code'
            );

            if(!navigator.onLine){

                let offlineRecords =
                JSON.parse(
                    localStorage.getItem(
                        'offline_attendance'
                    ) || '[]'
                );

                offlineRecords.push({
                    personnel_code:
                    personnelCode,

                    entry_time:
                    new Date().toLocaleString('fa-IR')
                });

                localStorage.setItem(
                    'offline_attendance',
                    JSON.stringify(
                        offlineRecords
                    )
                );

                alert(
                    'آفلاین ذخیره شد'
                );

                return;
            }

            const fileName =
            'attendance_' +
            personnelCode +
            '_' +
            Date.now() +
            '.jpg';

            const uploadResult =
            await supabaseClient.storage
            .from('reference-photos')
            .upload(
                'attendance/' + fileName,
                compressedFile,
                {
                    cacheControl:'3600',
                    upsert:true,
                    contentType:'image/jpeg'
                }
            );

            if(uploadResult.error){

                alert(
                    uploadResult.error.message
                );

                return;
            }

            const insertResult =
            await supabaseClient
            .from('eagle')
            .insert([{

                personnel_code:
                personnelCode,

                entry_time:
                new Date().toLocaleString('fa-IR'),

                photo_name:
                fileName
            }]);

            if(insertResult.error){

                alert(
                    insertResult.error.message
                );

                return;
            }

            alert(
                'تردد با موفقیت ثبت شد'
            );

            loadMyRecords();

        }catch(err){

            console.log(err);

            alert(
                'خطا:\n' +
                err.message
            );

        }finally{

            btn.disabled = false;
        }
    };

    attendanceInput.click();
}

async function loadMyRecords(){

    const personnel_code =
    localStorage.getItem(
        'employee_code'
    );

    if(!personnel_code){

        return;
    }

    const { data } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .eq(
        'personnel_code',
        personnel_code
    )
    .order(
        'id',
        {
            ascending:false
        }
    );

    if(!data){

        return;
    }

    let html = '';

    data.slice(0,3).forEach(item => {

        html += `
        <div class="record">
        <p>
        ${item.entry_time}
        </p>
        </div>
        `;
    });

    document.getElementById(
        'myRecords'
    ).innerHTML = html;
}

</script>
