<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
پنل مدیریت تردد
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    padding:20px;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{

    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;

    box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.card-top{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:15px;
}

.card-info{
    flex:1;
}

.card-info h3{

    margin-top:0;
    margin-bottom:10px;
    color:#1a2a6c;
}

.card-info p{

    margin:6px 0;
    font-size:14px;
}

.card-images{

    display:flex;
    gap:8px;
}

.card-images img{

    width:60px;
    height:60px;

    object-fit:cover;

    border-radius:10px;

    cursor:pointer;

    border:2px solid #1a2a6c;
}

button{

    background:#c62828;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.export-btn{

    margin-bottom:20px;
    background:#1a2a6c;
}

h2{
    text-align:center;
    color:#1a2a6c;
}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .card{

        padding:12px;
    }

    .card-top{

        display:block;
    }

    .card-info h3{

        font-size:18px;
    }

    .card-info p{

        font-size:13px;
    }

    .card-images{

        display:none;
    }

    button{

        width:100%;
        margin-top:10px;
    }
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="container">

<h2>
پنل مدیریت ترددها
</h2>

<button
class="export-btn"
onclick="exportExcel()">
دانلود اکسل
</button>

<div id="records">
در حال دریافت اطلاعات...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'YOUR_SUPABASE_KEY';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const password =
prompt('رمز مدیریت را وارد کنید');

if(password !== '12345'){

    document.body.innerHTML =
    '<h2 style="text-align:center;color:red;">دسترسی غیر مجاز</h2>';

}else{

    loadRecords();
}

function normalizeDate(str){

    let fixed = str;

    fixed = fixed
    .replaceAll('۰','0')
    .replaceAll('۱','1')
    .replaceAll('۲','2')
    .replaceAll('۳','3')
    .replaceAll('۴','4')
    .replaceAll('۵','5')
    .replaceAll('۶','6')
    .replaceAll('۷','7')
    .replaceAll('۸','8')
    .replaceAll('۹','9');

    return fixed.substring(0,10);
}

async function loadRecords(){

    const { data, error } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .order('id',{ascending:false});

    if(error){

        document.getElementById(
            'records'
        ).innerHTML =
        'خطا در دریافت اطلاعات';

        console.log(error);

        return;
    }

    const grouped = {};

    data.forEach(item => {

        const onlyDate =
        normalizeDate(
            item.entry_time
        );

        const key =

        item.personnel_code +
        '_' +
        onlyDate;

        if(!grouped[key]){

            grouped[key] = [];
        }

        grouped[key].push(item);
    });

    let html = '';

    Object.values(grouped)

    .forEach(records => {

        records.sort(
            (a,b)=> a.id - b.id
        );

        const first =
        records[0];

        const last =
        records[
            records.length - 1
        ];

        const date =
        normalizeDate(
            last.entry_time
        );

        html += `

        <div class="card">

        <div class="card-top">

        <div class="card-info">

        <h3>
        ${last.fullname}
        </h3>

        <p>
        کد پرسنلی:
        ${last.personnel_code}
        </p>

        <p>
        تاریخ:
        ${date}
        </p>

        <p>
        اولین تردد:
        ${first.entry_time}
        </p>

        <p>
        آخرین تردد:
        ${last.entry_time}
        </p>

        <p>
        GPS:
        ${String(last.latitude).substring(0,8)}
        ,
        ${String(last.longitude).substring(0,8)}
        </p>

        </div>

        <div class="card-images">

        ${
            first.photo_url
            ?

            `
            <img
            src="${first.photo_url}"
            onclick="
            window.open(this.src)
            ">
            `

            :

            ''
        }

        ${
            last.photo_url &&
            last.photo_url !==
            first.photo_url

            ?

            `
            <img
            src="${last.photo_url}"
            onclick="
            window.open(this.src)
            "
            style="
            border:2px solid green;
            ">
            `

            :

            ''
        }

        </div>

        </div>

        <button onclick="
        deleteRecord(
        ${last.id}
        )
        ">
        حذف
        </button>

        </div>
        `;
    });

    document.getElementById(
        'records'
    ).innerHTML = html;
}

async function deleteRecord(id){

    if(!confirm('حذف شود؟')) return;

    await supabaseClient
    .from('eagle')
    .delete()
    .eq('id', id);

    loadRecords();
}

async function exportExcel(){

    const { data, error } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .order('id',{ascending:false});

    if(error){

        alert('خطا در دریافت اطلاعات');

        return;
    }

    const excelData = data.map(item => ({

        'نام':
        item.fullname,

        'کد پرسنلی':
        item.personnel_code,

        'زمان':
        item.entry_time,

        'عرض جغرافیایی':
        item.latitude,

        'طول جغرافیایی':
        item.longitude,

        'لینک عکس':
        item.photo_url
    }));

    const worksheet =
    XLSX.utils.json_to_sheet(
        excelData
    );

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        'Attendance'
    );

    XLSX.writeFile(
        workbook,
        'attendance.xlsx'
    );
}

</script>

</body>
</html>
