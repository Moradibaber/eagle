
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
پنل مدیریت تردد
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{

    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;

    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card-top{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:15px;

    flex-wrap:nowrap;
}

.card-info{
    flex:1;
}

.card-images{

    display:flex;
    gap:8px;
}

.card-images img{

    width:60px;
    height:60px;

    object-fit:cover;

    border-radius:10px;

    cursor:pointer;
}

@media(max-width:700px){

    .card-top{

        flex-direction:column;
        align-items:flex-start;
    }

    .card-images{

        margin-top:10px;
    }

    .card-images img{

        width:55px;
        height:55px;
    }
}

img{

    border-radius:10px;
    margin-top:10px;
}



button{

    background:#c62828;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

h2{
    text-align:center;
    color:#1a2a6c;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


</head>

<body>

<div class="container">

<h2>
پنل مدیریت ترددها
</h2>

<button onclick="exportExcel()">
دانلود اکسل
</button>


<div id="records">
در حال دریافت اطلاعات...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);


const password =
prompt('رمز مدیریت را وارد کنید');

if(password !== '12345'){

    document.body.innerHTML =
    '<h2 style="text-align:center;color:red;">دسترسی غیر مجاز</h2>';

}else{

    loadRecords();
}


async function loadRecords(){

    const { data, error } =

    await supabaseClient

    .from('eagle')

    .select('*')

    .order(
        'id',
        {
            ascending:false
        }
    );

    if(error){

        document.getElementById(
            'records'
        ).innerHTML =

        'خطا در دریافت اطلاعات';

        return;
    }

    const grouped = {};

    data.forEach(item => {

        const fixedDate =

item.entry_time
.replaceAll('۰','0')
.replaceAll('۱','1')
.replaceAll('۲','2')
.replaceAll('۳','3')
.replaceAll('۴','4')
.replaceAll('۵','5')
.replaceAll('۶','6')
.replaceAll('۷','7')
.replaceAll('۸','8')
.replaceAll('۹','9');

const parts =
fixedDate.split(',');

const date =

parts[1]

? parts[1].trim()

: fixedDate;

        const date =
        fixedDate.substring(0,10);

        const key =
        item.personnel_code +
        '_' +
        date;

        if(!grouped[key]){

            grouped[key] = [];
        }

        grouped[key].push(item);
    });

    let html = '';

    Object.keys(grouped)

    .forEach(key => {

        const records =
        grouped[key];

        records.sort((a,b)=>
            a.id - b.id
        );

        const first =
        records[0];

        const last =
        records[
            records.length - 1
        ];

        let firstPhoto = '';
        let lastPhoto = '';

        if(first.photo_url){

            firstPhoto =
            first.photo_url;
        }

        if(last.photo_url){

            lastPhoto =
            last.photo_url;
        }

        html += `

        <div class="card">

        <div class="card-top">

       <div class="card-info">

        <h3>
        ${last.fullname}
        </h3>

        <p>
        کد پرسنلی:
        ${last.personnel_code}
        </p>

        <p>
        تاریخ:
        ${date}
        </p>

        <p>
        اولین تردد:
        ${first.entry_time}
        </p>

        <p>
        آخرین تردد:
        ${last.entry_time}
        </p>

        <p>
        GPS:
        ${last.latitude}
        ,
        ${last.longitude}
        </p>

        </div>

        <div class="card-images">

        ${
            firstPhoto
            ?

            `
            <img

            src="${firstPhoto}"

            onclick="
            window.open(this.src)
            "

            style="
            width:60px;
            height:60px;
            object-fit:cover;
            border-radius:10px;
            cursor:pointer;
            border:2px solid #1a2a6c;
            "
            >
            `
            :

            ''
        }

        ${
            lastPhoto &&
            lastPhoto !== firstPhoto
            ?

            `
            <img

            src="${lastPhoto}"

            onclick="
            window.open(this.src)
            "

            style="
            width:60px;
            height:60px;
            object-fit:cover;
            border-radius:10px;
            cursor:pointer;
            border:2px solid green;
            "
            >
            `
            :

            ''
        }

        </div>

        </div>

        <br>

        <button onclick="
        deleteRecord(
        ${last.id}
        )
        ">
        حذف
        </button>

        </div>
        `;
    });

    document.getElementById(
        'records'
    ).innerHTML = html;
}
async function deleteRecord(id){

    if(!confirm('حذف شود؟')) return;

    await supabaseClient
    .from('eagle')
    .delete()
    .eq('id', id);

    loadRecords();
}

async function exportExcel(){

    const { data, error } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .order('id', { ascending:false });

    if(error){

        alert('خطا در دریافت اطلاعات');

        return;
    }

    const excelData = data.map(item => ({

        'نام':
        item.fullname,

        'کد پرسنلی':
        item.personnel_code,

        'زمان':
        item.entry_time,

        'عرض جغرافیایی':
        item.latitude,

        'طول جغرافیایی':
        item.longitude,

        'لینک عکس':
        item.photo_url
    }));

    const worksheet =
    XLSX.utils.json_to_sheet(
        excelData
    );

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        'Attendance'
    );

    XLSX.writeFile(
        workbook,
        'attendance.xlsx'
    );
}


</script>

</body>
</html>
