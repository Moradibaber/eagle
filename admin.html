<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
پنل مدیریت تردد
</title>

<style>

body{
    font-family:tahoma;
    background:#f4f7fa;
    padding:20px;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{

    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;

    box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.card-top{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:15px;
}

.card-info{
    flex:1;
}

.card-info h3{

    margin-top:0;
    margin-bottom:10px;
    color:#1a2a6c;
}

.card-info p{

    margin:6px 0;
    font-size:14px;
}
    .card-info h3{

    font-size:15px;
}
    .card{

    overflow:hidden;
}
    .card-info{

    word-break:break-word;
}

.card-images{

    display:flex;
    gap:8px;
}

.card-images img{

    width:60px;
    height:60px;

    object-fit:cover;

    border-radius:10px;

    cursor:pointer;

    border:2px solid #1a2a6c;
}

button{

    background:#c62828;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.export-btn{

    margin-bottom:20px;
    background:#1a2a6c;
}

h2{
    text-align:center;
    color:#1a2a6c;
}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .card{
        padding:12px;
    }

    .card-top{
        display:block;
    }

    .card-info h3{
        font-size:15px;
    }

    .card-info p{
        font-size:11px;
        margin:3px 0;
    }

    .card-images{
        display:none;
    }

    button{
        width:100%;
        margin-top:10px;
    }
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="container">

<h2>
پنل مدیریت ترددها
</h2>

<button
class="export-btn"
onclick="exportExcel()">
دانلود اکسل
</button>

<div id="records">
در حال دریافت اطلاعات...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
'https://kddhnohquohbnemmegdy.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGhub2hxdW9oYm5lbW1lZ2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTgyOTcsImV4cCI6MjA5NjkzNDI5N30.AfYR7f7jnDfmsG07d6vngkr2Sy_HfWRpiarXQV3xxSc';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const password =
prompt('رمز مدیریت را وارد کنید');

if(password !== '12345'){

    document.body.innerHTML =
    '<h2 style="text-align:center;color:red;">دسترسی غیر مجاز</h2>';

}else{

    loadRecords();
}


async function loadRecords(){

    const { data, error } =

    await supabaseClient
    .from('eagle')
    .select('*')
    .order('id',{ascending:false});

    if(error){

        document.getElementById('records')
        .innerHTML = 'خطا در دریافت اطلاعات';

        console.log(error);
        return;
    }

    const isMobile =
    window.innerWidth < 700;

    const grouped = {};

    data.forEach(item => {

        let fixedDate =
        String(item.entry_time);

        fixedDate = fixedDate
        .replaceAll('۰','0')
        .replaceAll('۱','1')
        .replaceAll('۲','2')
        .replaceAll('۳','3')
        .replaceAll('۴','4')
        .replaceAll('۵','5')
        .replaceAll('۶','6')
        .replaceAll('۷','7')
        .replaceAll('۸','8')
        .replaceAll('۹','9');

        const onlyDate =
        fixedDate.substring(0,10);

        const key =
        item.personnel_code +
        '_' +
        onlyDate;

        if(!grouped[key]){

            grouped[key] = [];
        }

        grouped[key].push(item);
    });

    const groupedArray =
    Object.values(grouped)
    .sort((a,b)=>
        b[b.length-1].id -
        a[a.length-1].id
    )
    .slice(0,7);

    let html = '';

    if(isMobile){

        html += `

        <div style="
        background:white;
        border-radius:12px;
        padding:10px;
        overflow:auto;
        box-shadow:0 0 10px rgba(0,0,0,0.08);
        ">

        <table style="
        width:100%;
        border-collapse:collapse;
        font-size:12px;
        text-align:center;
        ">

        <tr style="
        background:#1a2a6c;
        color:white;
        ">

        <th style="padding:8px;">پرسنل</th>
        <th>تاریخ</th>
        <th>اولین</th>
        <th>آخرین</th>
        <th>GPS</th>

        </tr>
        `;

        groupedArray.forEach(records => {

            records.sort(
                (a,b)=> a.id - b.id
            );

            const first =
            records[0];

            const last =
            records[records.length-1];

            const date =
            String(last.entry_time)
            .substring(0,10);

            html += `

            <tr style="
            border-bottom:1px solid #ddd;
            ">

            <td style="padding:8px;">
            ${last.personnel_code}
            </td>

            <td>
            ${date}
            </td>

            <td>
            ${String(first.entry_time).substring(11,16)}
            </td>

            <td>
            ${String(last.entry_time).substring(11,16)}
            </td>

            <td>
            ${String(last.latitude).substring(0,6)}
            </td>

            </tr>
            `;
        });

        html += `
        </table>
        </div>
        `;

    }else{

        groupedArray.forEach(records => {

            records.sort(
                (a,b)=> a.id - b.id
            );

            const first =
            records[0];

            const last =
            records[records.length-1];

            const date =
            String(last.entry_time)
            .substring(0,10);

            html += `

            <div class="card">

            <div class="card-top">

            <div class="card-info">

            <h3>
            ${last.fullname}
            </h3>

            <p>
            کد پرسنلی:
            ${last.personnel_code}
            </p>

            <p>
            تاریخ:
            ${date}
            </p>

            <p>
            اولین تردد:
            ${first.entry_time}
            </p>

            <p>
            آخرین تردد:
            ${last.entry_time}
            </p>

            <p>
            GPS:
            ${String(last.latitude).substring(0,8)}
            ,
            ${String(last.longitude).substring(0,8)}
            </p>

            </div>

            <div class="card-images">

            ${
                first.photo_url
                ?

                `
                <img
                src="${first.photo_url}"
                onclick="
                window.open(this.src)
                ">
                `

                :

                ''
            }

            ${
                last.photo_url &&
                last.photo_url !==
                first.photo_url

                ?

                `
                <img
                src="${last.photo_url}"
                onclick="
                window.open(this.src)
                "
                style="
                border:2px solid green;
                ">
                `

                :

                ''
            }

            </div>

            </div>

            <button onclick="
            deleteRecord(
            ${last.id}
            )
            ">
            حذف
            </button>

            </div>
            `;
        });
    }

    document.getElementById(
        'records'
    ).innerHTML = html;
}

async function deleteRecord(id){

    if(!confirm('حذف شود؟')) return;

    await supabaseClient
    .from('eagle')
    .delete()
    .eq('id', id);

    loadRecords();
}

async function exportExcel(){

    const { data, error } =
    await supabaseClient
    .from('eagle')
    .select('*')
    .order('id',{ascending:false});

    if(error){

        alert('خطا در دریافت اطلاعات');

        return;
    }

    const excelData = data.map(item => ({

        'نام':
        item.fullname,

        'کد پرسنلی':
        item.personnel_code,

        'زمان':
        item.entry_time,

        'عرض جغرافیایی':
        item.latitude,

        'طول جغرافیایی':
        item.longitude,

        'لینک عکس':
        item.photo_url
    }));

    const worksheet =
    XLSX.utils.json_to_sheet(
        excelData
    );

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        'Attendance'
    );

    XLSX.writeFile(
        workbook,
        'attendance.xlsx'
    );
}

</script>

</body>
</html>
